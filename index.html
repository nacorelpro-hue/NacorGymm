<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NacorGym Ultimate</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  
  <!-- Tailwind CSS & Plus Jakarta Sans Font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { brand: '#a3e635', darkBg: '#09090b', darkCard: '#18181b' }
        }
      }
    }
  </script>
  
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      background-color: #09090b;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overscroll-behavior-y: contain;
    }
    .dark body { background-color: #09090b; }
    .light body { background-color: #f4f4f5; }
    
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .scrollable-content {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body class="text-zinc-100 dark:text-zinc-100 light:text-zinc-900 font-sans min-h-screen flex flex-col justify-between overflow-x-hidden pb-20 transition-colors duration-200">

  <!-- HEADER -->
  <header class="border-b border-zinc-900 dark:border-zinc-900 light:border-zinc-200 bg-zinc-950/95 dark:bg-zinc-950/95 light:bg-white/95 backdrop-blur-md sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-3.5 h-7 bg-brand rounded-full shadow-[0_0_15px_rgba(163,230,53,0.5)]"></div>
      <h1 class="text-xl font-extrabold tracking-tight dark:text-white light:text-zinc-950">Nacor<span class="text-brand">Gym</span><span class="text-[8px] bg-brand/20 text-brand px-1.5 py-0.5 rounded ml-1.5 font-bold uppercase">Ultimate</span></h1>
    </div>
    
    <div class="flex items-center gap-2">
      <button onclick="toggleTheme()" class="p-2 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-100 rounded-xl text-xs active:scale-95 transition-transform">🌓</button>
      <button onclick="openPlateCalculator()" class="p-2 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-100 rounded-xl text-xs active:scale-95 transition-transform">🏋️‍♂️</button>
    </div>
  </header>

  <!-- POPUP TEMPORIZADOR DE DESCANSO -->
  <div id="timer-banner" class="hidden fixed top-20 left-1/2 -translate-x-1/2 bg-zinc-950/95 dark:bg-zinc-950/95 light:bg-white border border-brand/40 px-5 py-3 rounded-2xl z-50 shadow-2xl flex flex-col items-center gap-2 backdrop-blur-lg w-72">
    <div class="flex items-center justify-between w-full">
      <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Tiempo de Descanso</span>
      <span id="timer-display" class="text-brand font-mono font-extrabold text-lg">01:30</span>
    </div>
    <div class="flex gap-1.5 w-full">
      <button onclick="adjustTimer(-30)" class="flex-1 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-100 border border-zinc-800 dark:border-zinc-800 light:border-zinc-200 rounded-lg text-xs font-semibold">-30s</button>
      <button onclick="adjustTimer(30)" class="flex-1 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-100 border border-zinc-800 dark:border-zinc-800 light:border-zinc-200 rounded-lg text-xs font-semibold">+30s</button>
      <button onclick="stopTimer()" class="flex-1 py-1 bg-red-900/30 text-red-500 border border-red-900/40 rounded-lg text-xs font-bold">Saltar</button>
    </div>
    <div class="flex items-center gap-1.5 mt-1">
      <input type="checkbox" id="sound-alert-toggle" checked class="accent-brand">
      <label for="sound-alert-toggle" class="text-[9px] text-zinc-500 font-bold uppercase">Sonido al finalizar</label>
    </div>
  </div>

  <!-- MODAL MULTIUSOS: CALCULADORA DE DISCOS -->
  <div id="plate-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-zinc-950 dark:bg-zinc-950 light:bg-white border border-zinc-800 dark:border-zinc-800 light:border-zinc-200 rounded-2xl p-5 w-full max-w-sm">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-sm text-zinc-200 dark:text-zinc-200 light:text-zinc-800">Calculadora de Discos (Barra 20kg)</h3>
        <button onclick="closePlateCalculator()" class="text-zinc-500 text-xs font-bold">Cerrar</button>
      </div>
      <div class="mb-4">
        <label class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider block mb-1">Peso Objetivo (Kg)</label>
        <div class="flex gap-2">
          <input type="number" id="calc-weight-input" placeholder="Ej: 80" class="bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-100 border border-zinc-800 dark:border-zinc-800 light:border-zinc-200 rounded-xl px-3 py-2 w-full text-white dark:text-white light:text-zinc-900 font-bold focus:outline-none focus:border-brand">
          <button onclick="calculatePlates()" class="bg-brand text-zinc-950 px-4 rounded-xl text-xs font-bold">Calcular</button>
        </div>
      </div>
      <div id="plates-output" class="text-xs text-zinc-400 space-y-1"></div>
    </div>
  </div>

        <h3 class="font-extrabold text-lg dark:text-zinc-100 light:text-zinc-900">Añadir Ejercicio</h3>
        <button onclick="closeAddExerciseModal()" class="text-zinc-400 text-xs font-extrabold bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 border border-zinc-800 dark:border-zinc-800 light:border-zinc-300 px-3.5 py-2 rounded-xl">Hecho</button>
      </div>
      
      <!-- FILTRO 1: EQUIPAMIENTO -->
      <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Filtrar por Equipo</span>
      <div class="flex gap-1.5 overflow-x-auto pb-2 mb-2 no-scrollbar shrink-0">
        <button onclick="filterEquip('Todos')" class="equip-filter-btn px-3 py-1 bg-brand text-zinc-950 text-[11px] font-bold rounded-lg shrink-0">Todos</button>
        <button onclick="filterEquip('Mancuernas')" class="equip-filter-btn px-3 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 text-zinc-400 text-[11px] font-bold rounded-lg shrink-0">Mancuernas</button>
        <button onclick="filterEquip('Máquinas')" class="equip-filter-btn px-3 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 text-zinc-400 text-[11px] font-bold rounded-lg shrink-0">Máquinas</button>

        <button onclick="filterEquip('Otros')" class="equip-filter-btn px-3 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 text-zinc-400 text-[11px] font-bold rounded-lg shrink-0">Otros</button>
      </div>

        <button onclick="filterMuscle('Pecho')" class="muscle-filter-btn px-3 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 text-zinc-400 text-[11px] font-bold rounded-lg shrink-0">Pecho</button>
        <button onclick="filterMuscle('Espalda')" class="muscle-filter-btn px-3 py-1 bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 text-zinc-400 text-[11px] font-bold rounded-lg shrink-0">Espalda</button>

      </div>

      <input type="text" id="modal-search-input" onkeyup="searchModalExercises()" placeholder="Escribe para buscar..." class="w-full bg-zinc-900 dark:bg-zinc-900 light:bg-zinc-200 border border-zinc-800 dark:border-zinc-800 light:border-zinc-300 rounded-xl px-4 py-3 text-xs text-white dark:text-white light:text-zinc-900 mb-4 focus:outline-none shrink-0">

      <div id="modal-exercises-list" class="flex-1 scrollable-modal-content space-y-2 pb-16">
        <!-- Render dinámico -->
      </div>
    </div>
  </div>

  <!-- MAIN CONTAINER -->
  <main id="app-content" class="flex-1 px-4 py-5 pb-24 overflow-y-auto max-w-lg mx-auto w-full">
    <!-- El contenido de las pestañas se monta dinámicamente aquí -->
  </main>

  </nav>

    let activeTab = 'entrenar';
    let activeWorkout = null;
    let lastWorkoutCached = null;

    // Temporizadores
    let timerInterval = null;
    let timerSecondsLeft = 0;
    let workoutTimerInterval = null;
    let workoutSecondsElapsed = 0;

    // Filtros de búsqueda cruzados
    let selectedEquipFilter = 'Todos';
    let selectedMuscleFilter = 'Todos';

    // Inicialización IndexedDB local para funcionamiento ilimitado y offline
    const request = indexedDB.open("NacorGymUltimateDB_v1", 2);
    request.onupgradeneeded = (e) => {
      const activeDb = e.target.result;
      if (!activeDb.objectStoreNames.contains("workouts")) {
        activeDb.createObjectStore("workouts", { keyPath: "id", autoIncrement: true });
      }
      if (!activeDb.objectStoreNames.contains("exercises_history")) {
        activeDb.createObjectStore("exercises_history", { keyPath: "id", autoIncrement: true });
      }
      if (!activeDb.objectStoreNames.contains("biometrics")) {
        activeDb.createObjectStore("biometrics", { keyPath: "date" }); // Almacenará peso, medidas, etc.
      }
      if (!activeDb.objectStoreNames.contains("exercise_meta")) {
        activeDb.createObjectStore("exercise_meta", { keyPath: "name" }); // Vídeos de técnica y consejos
      }
      if (!activeDb.objectStoreNames.contains("goals")) {
        activeDb.createObjectStore("goals", { keyPath: "id", autoIncrement: true });
      }
    };
    
    request.onsuccess = (e) => {
      db = e.target.result;
      loadLastWorkoutToCache();
      switchTab('entrenar');
    };

    function toggleTheme() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        html.classList.add('light');
      } else {
        html.classList.remove('light');
        html.classList.add('dark');
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      ['entrenar', 'ejercicios', 'body', 'objetivos', 'resumen'].forEach(t => {
        const btn = document.getElementById(`nav-${t}`);
        if (t === tab) {
          btn.classList.add('text-brand');
          btn.classList.remove('text-zinc-500');
        } else {
          btn.classList.remove('text-brand');
          btn.classList.add('text-zinc-500');
        }
      });
      renderTabContent();
    }

    function renderTabContent() {
      const container = document.getElementById('app-content');
      if (activeTab === 'entrenar') {
        if (activeWorkout) {
          renderActiveWorkout(container);
        } else {
          renderWorkoutStarter(container);
        }
      } else if (activeTab === 'ejercicios') {
        renderExerciseLibrary(container);
      } else if (activeTab === 'body') {
        renderBodyTracking(container);
      } else if (activeTab === 'objetivos') {
        renderGoalsSection(container);
      } else if (activeTab === 'resumen') {
        renderIndependentSummary(container);
      }
    }

    // --- SÍNTESIS DE SONIDO DE ALERTA NATIVA DE SAFARI/IOS (SIN ARCHIVO EXTERNO) ---
    function playBeepSound() {
      const toggle = document.getElementById('sound-alert-toggle');
      if (toggle && !toggle.checked) return;
      try {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gainNode = context.createGain();
        oscillator.type = "sine";
        oscillator.frequency.value = 880; // Sonido limpio de campana
        gainNode.gain.setValueAtTime(0.3, context.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.35);
      } catch (err) {
        console.log("Síntesis de audio bloqueada por Safari. Requiere un toque previo del usuario.", err);
      }
    }

    function startTimer(seconds) {
      clearInterval(timerInterval);
      timerSecondsLeft = seconds;
      document.getElementById('timer-banner').classList.remove('hidden');

      timerInterval = setInterval(() => {
        timerSecondsLeft--;
        updateTimerDisplay();
        if (timerSecondsLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timer-banner').classList.add('hidden');
          playBeepSound();
        }
      }, 1000);
    }

    function adjustTimer(amount) {
      timerSecondsLeft += amount;
      if (timerSecondsLeft < 0) timerSecondsLeft = 0;
      updateTimerDisplay();
    }

    function stopTimer() {
      clearInterval(timerInterval);
      document.getElementById('timer-banner').classList.add('hidden');
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timerSecondsLeft / 60).toString().padStart(2, '0');
      const secs = (timerSecondsLeft % 60).toString().padStart(2, '0');
      document.getElementById('timer-display').textContent = `${mins}:${secs}`;

      const lastSession = await getLastExerciseSession(exerciseName);

        sets: lastSession ? lastSession.sets.map(s => ({ peso: s.peso, reps: s.reps, note: s.note || '', done: false })) : [{ peso: '', reps: '', note: '', done: false }]
      });
      renderModalExercisesList();

    function addSet(exIdx) {
      const sets = activeWorkout.exercises[exIdx].sets;
      const lastSet = sets[sets.length - 1] || { peso: '', reps: '', note: '' };
      sets.push({ peso: lastSet.peso, reps: lastSet.reps, note: '', done: false });
      renderTabContent();
    }

    function deleteSet(exIdx, setIdx) {
      if (activeWorkout.exercises[exIdx].sets.length > 1) {
        activeWorkout.exercises[exIdx].sets.splice(setIdx, 1);
        renderTabContent();
      }
    }

    function toggleSetDone(exIdx, setIdx) {
      const set = activeWorkout.exercises[exIdx].sets[setIdx];
      const pesoVal = document.getElementById(`peso-${exIdx}-${setIdx}`).value;
      const repsVal = document.getElementById(`reps-${exIdx}-${setIdx}`).value;
      const noteVal = document.getElementById(`note-${exIdx}-${setIdx}`).value;

      set.peso = pesoVal !== '' ? parseFloat(pesoVal) : '';
      set.reps = repsVal !== '' ? parseInt(repsVal) : '';
      set.note = noteVal;
      set.done = !set.done;

      if (set.done) {
        const restTime = activeWorkout.exercises[exIdx].restTime || 90;
        startTimer(restTime);
      }
      renderTabContent();
    }

    function toggleNoteInput(exIdx, setIdx) {
      document.getElementById(`note-container-${exIdx}-${setIdx}`).classList.toggle('hidden');

    async function finishWorkout() {
      const workoutToSave = {
        routine: activeWorkout.routine,
        date: new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }),
        rawDate: new Date(),
        duration: document.getElementById('workout-duration').textContent,
        exercises: activeWorkout.exercises.map(ex => ({
          name: ex.name,
          sets: ex.sets.filter(s => s.done).map(s => ({ peso: s.peso, reps: s.reps, note: s.note }))
        })).filter(ex => ex.sets.length > 0)
      };

      if (workoutToSave.exercises.length === 0) {
        alert("Completa y pulsa '✓' en al menos una serie antes de guardar.");
        return;
      }

      const transaction = db.transaction(["workouts", "exercises_history"], "readwrite");
      transaction.objectStore("workouts").add(workoutToSave);

      workoutToSave.exercises.forEach(ex => {
        transaction.objectStore("exercises_history").add({
          exerciseName: ex.name,
          date: workoutToSave.date,
          rawDate: workoutToSave.rawDate,
          sets: ex.sets
        });
      });

      lastWorkoutCached = workoutToSave;
      activeWorkout = null;
      clearInterval(workoutTimerInterval);
      stopTimer();
      alert("¡Entrenamiento guardado con éxito!");
      switchTab('resumen');
    }

    function cancelWorkout() {
      if (confirm("¿Seguro que deseas descartar este entreno?")) {
        activeWorkout = null;
        clearInterval(workoutTimerInterval);
        stopTimer();
        switchTab('entrenar');
      }
    }

    // --- CACHÉ Y DATOS LOCALES ---
    function loadLastWorkoutToCache() {
      const transaction = db.transaction(["workouts"], "readonly");
      transaction.objectStore("workouts").openCursor(null, "prev").onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          lastWorkoutCached = cursor.value;
        }
      };
    }

    function getLastExerciseSession(exerciseName) {
      return new Promise((resolve) => {
        const transaction = db.transaction(["exercises_history"], "readonly");
        const store = transaction.objectStore("exercises_history");
        let result = null;

        store.openCursor(null, "prev").onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.value.exerciseName === exerciseName) {
              result = cursor.value;
              resolve(result);
              return;
            }
            cursor.continue();
          } else {
            resolve(null);
          }
        };
      });
    }

    // --- DETALLE DE EJERCICIO (HISTORIAL Y ANÁLISIS COMPLETO) ---
    async function openExerciseDetail(exerciseName) {
      const container = document.getElementById('app-content');
      const rawHistory = await getExerciseHistory(exerciseName);
      const history = rawHistory.reverse();
      
      // Obtener metadatos locales (técnica y consejos)
      const meta = await getExerciseMeta(exerciseName) || { tips: '', videoUrl: '' };

      const firstSession = history[history.length - 1];
      const recordsThisMonth = getMonthlyRecords(history);

      let recordMax = 0;
      let maxReps = 0;
      let totalVolume = 0;
      let listHTML = '';

      const chartLabels = [];
      const chartWeights = [];
      const chartReps = [];
      const chartEst1RM = [];

      history.forEach((session) => {
        let sessionMaxWeight = 0;
        let sessionHTML = `
          <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl mb-2">
            <span class="text-[9px] font-bold text-zinc-400 block border-b border-zinc-800 pb-1 mb-2">${session.date}</span>
        `;
        session.sets.forEach((set, sIdx) => {
          const w = parseFloat(set.peso) || 0;
          const r = parseInt(set.reps) || 0;
          if (w > recordMax) recordMax = w;
          if (w > sessionMaxWeight) sessionMaxWeight = w;
          if (r > maxReps) maxReps = r;
          totalVolume += w * r;

          sessionHTML += `
            <div class="flex justify-between text-xs py-0.5">
              <span class="text-zinc-500">Serie ${sIdx + 1}</span>
              <span class="font-bold text-zinc-300">${set.peso} kg × ${set.reps} r ${set.note ? `<span class="text-brand text-[9px] italic ml-1">[${set.note}]</span>` : ''}</span>
            </div>
          `;
        });
        sessionHTML += `</div>`;
        listHTML += sessionHTML;

        chartLabels.push(session.date);
        chartWeights.push(sessionMaxWeight);
        
        // Volumen y reps máximas de la sesión para las gráficas
        const sessionMaxReps = Math.max(...session.sets.map(s => parseInt(s.reps) || 0));
        chartReps.push(sessionMaxReps);
        
        // Epley 1RM: $1RM = Peso \cdot \left(1 + \frac{Reps}{30}\right)$
        const session1RM = Math.round(sessionMaxWeight * (1 + sessionMaxReps / 30));
        chartEst1RM.push(session1RM);
      });

      const calculated1RM = recordMax > 0 && maxReps > 0 ? Math.round(recordMax * (1 + maxReps / 30)) : 0;

      container.innerHTML = `
        <button onclick="switchTab('ejercicios')" class="text-brand text-xs font-bold mb-4 flex items-center gap-1">← Biblioteca</button>
        <h2 class="text-xl font-extrabold mb-3 tracking-tight">${exerciseName}</h2>

        <div class="grid grid-cols-3 gap-2 mb-4">
          <div class="bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-center">
            <span class="text-[8px] text-zinc-500 font-bold block mb-0.5 uppercase">Primer Registro</span>
            <span class="text-[10px] font-extrabold text-zinc-300">${firstSession ? firstSession.date : '---'}</span>
          </div>
          <div class="bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-center">
            <span class="text-[8px] text-zinc-500 font-bold block mb-0.5 uppercase">1RM Máx.</span>
            <span class="text-xs font-extrabold text-brand">${calculated1RM} Kg</span>
          </div>
          <div class="bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-center">
            <span class="text-[8px] text-zinc-500 font-bold block mb-0.5 uppercase">Récord Mes</span>
            <span class="text-xs font-extrabold text-white">${recordsThisMonth.maxWeight} Kg</span>

    function toggleChartType(type) {
      const labels = window.currentChartLabels;
      const weights = window.currentChartWeights;
      const reps = window.currentChartReps;
      const est1RM = window.currentChartEst1RM;

      ['weight', 'reps', '1rm'].forEach(t => {
        const btn = document.getElementById(`btn-chart-${t}`);
        if (t === type) {
          btn.classList.add('bg-brand', 'text-zinc-950');
          btn.classList.remove('bg-zinc-800', 'text-zinc-400');
        } else {
          btn.classList.remove('bg-brand', 'text-zinc-950');
          btn.classList.add('bg-zinc-800', 'text-zinc-400');
        }
      });

      if (type === 'weight') {
        renderChart(labels, weights, 'Peso Máximo (Kg)');
      } else if (type === 'reps') {
        renderChart(labels, reps, 'Repeticiones Máximas');
      } else if (type === '1rm') {
        renderChart(labels, est1RM, '1RM Estimado (Kg)');

    }

    function renderChart(labels, data, datasetLabel) {
      const ctx = document.getElementById('exerciseChart').getContext('2d');
      if (window.activeDetailChart) {
        window.activeDetailChart.destroy();
      }
      window.activeDetailChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels.slice(-6), // Últimas 6 sesiones
          datasets: [{
            label: datasetLabel,
            data: data.slice(-6),
            borderColor: '#a3e635',
            backgroundColor: 'rgba(163, 230, 53, 0.05)',
            tension: 0.3,
            fill: true,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#27272a' }, ticks: { color: '#71717a', font: { size: 9 } } },
            x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 9 } } }
          }
        }
      });
    }

    function getMonthlyRecords(history) {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      
      let maxWeight = 0;
      history.forEach(session => {
        const d = new Date(session.rawDate);
        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
          session.sets.forEach(s => {
            const w = parseFloat(s.peso) || 0;
            if (w > maxWeight) maxWeight = w;
          });
        }
      });
      return { maxWeight };
    }

    async function createGoal() {
      const exercise = document.getElementById('goal-exercise-select').value;
      const targetVal = document.getElementById('goal-weight-input').value;

      if (!targetVal) return;

      // Obtener el récord de este ejercicio actual
      const history = await getExerciseHistory(exercise);
      let record = 0;
      history.forEach(s => {
        s.sets.forEach(set => {
          const w = parseFloat(set.peso) || 0;
          if (w > record) record = w;
        });
      });

      const goal = { exercise, target: parseFloat(targetVal), current: record };
      const transaction = db.transaction(["goals"], "readwrite");
      transaction.objectStore("goals").add(goal);
      alert("¡Objetivo registrado!");
      renderTabContent();
    }

    function exportToTXT() {
      if (!lastWorkoutCached) return;
      let text = `💪 NacorGym Ultimate Report - ${lastWorkoutCached.routine} (${lastWorkoutCached.date})\n⏱️ Duración de sesión: ${lastWorkoutCached.duration || 'N/A'}\n\n`;
      lastWorkoutCached.exercises.forEach(ex => {
        text += `• ${ex.name}:\n`;
        ex.sets.forEach((set, sIdx) => {
          text += `  Serie ${sIdx + 1}: ${set.peso} kg x ${set.reps} r ${set.note ? `[${set.note}]` : ''}\n`;
        });
        text += `\n`;
      });
      navigator.clipboard.writeText(text).then(() => alert("¡Reporte copiado en portapapeles en formato texto!"));
    }

    function exportToExcelCSV() {
      if (!lastWorkoutCached) return;
      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Ejercicio,Serie,Peso,Repeticiones,Nota\r\n";

      lastWorkoutCached.exercises.forEach(ex => {
        ex.sets.forEach((set, sIdx) => {
          csvContent += `"${ex.name}",${sIdx + 1},${set.peso},${set.reps},"${set.note || ''}"\r\n`;
        });
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `NacorGym_Entrenamiento_${lastWorkoutCached.date.replace(/ /g, "_")}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

          cursor.continue();
        } else {
          const backup = { workouts, history };
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
          const dlAnchor = document.createElement('a');
          dlAnchor.setAttribute("href", dataStr);
          dlAnchor.setAttribute("download", `NacorGym_Ultimate_Backup.json`);
          dlAnchor.click();
        }
      };
    }

    function triggerImport() { document.getElementById('importFile').click(); }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(evt) {
        try {
          const backup = JSON.parse(evt.target.result);
          const transaction = db.transaction(["workouts", "exercises_history"], "readwrite");
          transaction.objectStore("workouts").clear();
          transaction.objectStore("exercises_history").clear();

          backup.workouts.forEach(w => transaction.objectStore("workouts").add(w));
          backup.history.forEach(h => transaction.objectStore("exercises_history").add(h));

          alert("¡Copia importada!");
          renderTabContent();
        } catch { alert("Error en el formato de importación."); }
      };
      reader.readAsText(file);
    }

    function getAllWorkouts() {
      return new Promise((resolve) => {
        const transaction = db.transaction(["workouts"], "readonly");
        const store = transaction.objectStore("workouts");
        const results = [];
        store.openCursor().onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            results.push(cursor.value);
            cursor.continue();
          } else {
            resolve(results);
          }
        };
      });
    }

    // --- UTILERÍA: CALENTAMIENTO ---
    function openWarmupCalculator() {
      document.getElementById('warmup-modal').classList.remove('hidden');
      document.getElementById('warmup-output').innerHTML = '';
    }

    function closeWarmupCalculator() {
      document.getElementById('warmup-modal').classList.add('hidden');
    }

    function calculateWarmup() {
      const weightVal = document.getElementById('warmup-weight-input').value;
      const output = document.getElementById('warmup-output');
      if (!weightVal) return;

      const target = parseFloat(weightVal);
      const s1 = Math.round(target * 0.40);
      const s2 = Math.round(target * 0.60);
      const s3 = Math.round(target * 0.80);

      output.innerHTML = `
        <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-850 space-y-2 mt-3 text-white dark:text-white light:text-zinc-900">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider block">Tu Protocolo de Calentamiento:</span>
          <div class="flex justify-between text-xs py-1 border-b border-zinc-950">
            <span class="text-zinc-400 font-medium">Aproximación 1 (40%):</span>
            <span class="text-brand font-bold">${s1} kg × 10 reps</span>
          </div>
          <div class="flex justify-between text-xs py-1 border-b border-zinc-950">
            <span class="text-zinc-400 font-medium">Aproximación 2 (60%):</span>
            <span class="text-brand font-bold">${s2} kg × 6 reps</span>
          </div>
          <div class="flex justify-between text-xs py-1">
            <span class="text-zinc-400 font-medium">Aproximación 3 (80%):</span>
            <span class="text-brand font-bold">${s3} kg × 2 reps</span>
          </div>
        </div>
      `;
    }

    // --- CALCULADORA DE DISCOS ---
    function openPlateCalculator() {
      document.getElementById('plate-modal').classList.remove('hidden');
    }

    function closePlateCalculator() {
      document.getElementById('plate-modal').classList.add('hidden');
    }

    function calculatePlates() {
      const targetInput = document.getElementById('calc-weight-input').value;
      const output = document.getElementById('plates-output');
      if (!targetInput) return;

      const totalWeight = parseFloat(targetInput);
      const barWeight = 20;
      const remainingWeight = totalWeight - barWeight;

      if (remainingWeight < 0) {
        output.innerHTML = `<span class="text-red-400 font-bold">Debe ser superior a 20 kg (barra olímpica).</span>`;
        return;
      }

      const weightsOnOneSide = remainingWeight / 2;
      const availablePlates = [25, 20, 15, 10, 5, 2.5, 1.25];
      let leftToCalculate = weightsOnOneSide;
      let plateCounts = {};

      availablePlates.forEach(plate => {
        const count = Math.floor(leftToCalculate / plate);
        if (count > 0) {
          plateCounts[plate] = count;
          leftToCalculate -= count * plate;
        }
      });

      let resultsHTML = `<span class="block text-[10px] uppercase font-bold text-zinc-500 mb-2">Discos por cada lado:</span>`;
      for (const [plate, count] of Object.entries(plateCounts)) {
        resultsHTML += `
          <div class="flex justify-between py-1 border-b border-zinc-900 text-white dark:text-white light:text-zinc-800">
            <span class="font-bold">${plate} kg</span>
            <span class="text-brand font-extrabold">x ${count} ud.</span>
          </div>
        `;
      }
      output.innerHTML = resultsHTML;
    }
  </script>
