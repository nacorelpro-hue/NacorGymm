<style>
/* ============================================================
   NACORGYM — DESIGN SYSTEM
   Tokens, reset, typography, primitives, components.
   Zero external dependencies — fully self-contained for offline use.
   ============================================================ */

:root{
  color-scheme: dark;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

  /* --- brand --- */
  --brand: #a3e635;
  --brand-strong: #bef264;
  --brand-ink: #0b1405;      /* text color placed ON TOP of brand fills */
  --brand-text: #a3e635;      /* brand color used AS text/icon on page bg */
  --brand-wash: rgba(163,230,53,.12);
  --brand-wash-strong: rgba(163,230,53,.22);
  --brand-ring: rgba(163,230,53,.35);

  --gold: #fbbf24;
  --gold-strong: #f59e0b;
  --gold-wash: rgba(251,191,36,.14);

  --danger: #f87171;
  --danger-strong: #ef4444;
  --danger-wash: rgba(248,113,113,.1);
  --danger-ink: #2a0a0a;

  /* --- surfaces (dark default) --- */
  --bg: #08080a;
  --bg-elevated: #17171a;
  --bg-elevated-2: #0e0e10;
  --bg-sunken: #050506;
  --border: #262629;
  --border-subtle: #1a1a1c;
  --overlay: rgba(5,5,6,.72);

  --text-primary: #f5f5f6;
  --text-secondary: #9c9ca3;
  --text-tertiary: #656569;
  --text-on-brand: #0b1405;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 8px 24px -8px rgba(0,0,0,.55);
  --shadow-lg: 0 16px 48px -12px rgba(0,0,0,.65);
  --shadow-brand: 0 8px 24px -6px rgba(163,230,53,.28);

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 999px;

  --ease-standard: cubic-bezier(.4,0,.2,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --dur-fast: 120ms;
  --dur-base: 220ms;
  --dur-slow: 380ms;

  --safe-t: env(safe-area-inset-top);
  --safe-b: env(safe-area-inset-bottom);
  --safe-l: env(safe-area-inset-left);
  --safe-r: env(safe-area-inset-right);
}

:root[data-theme="light"]{
  color-scheme: light;
  --brand-ink: #0b1405;
  --brand-text: #588a10;
  --brand-wash: rgba(101,163,13,.10);
  --brand-wash-strong: rgba(101,163,13,.16);
  --brand-ring: rgba(101,163,13,.30);

  --danger-wash: rgba(239,68,68,.08);

  --bg: #f2f2f5;
  --bg-elevated: #ffffff;
  --bg-elevated-2: #ececef;
  --bg-sunken: #e8e8eb;
  --border: #e2e2e6;
  --border-subtle: #ececef;
  --overlay: rgba(20,20,24,.4);

  --text-primary: #0c0c0d;
  --text-secondary: #6c6c72;
  --text-tertiary: #9a9aa1;
  --text-on-brand: #0b1405;

  --shadow-sm: 0 1px 2px rgba(20,20,30,.06);
  --shadow-md: 0 8px 24px -8px rgba(20,20,30,.14);
  --shadow-lg: 0 16px 40px -12px rgba(20,20,30,.18);
  --shadow-brand: 0 8px 20px -6px rgba(101,163,13,.22);
}

*,*::before,*::after{ box-sizing: border-box; }
html{ -webkit-text-size-adjust: 100%; }
html,body{ height: 100%; }
body{
  margin: 0;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior-y: none;
  transition: background-color var(--dur-base) var(--ease-standard), color var(--dur-base) var(--ease-standard);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
input, textarea{ -webkit-user-select: text; user-select: text; }
h1,h2,h3,h4,p{ margin: 0; }
button{ font-family: inherit; color: inherit; }
button, [role="button"]{ cursor: pointer; touch-action: manipulation; }
a{ color: inherit; }
img{ max-width: 100%; display: block; }
svg{ display: block; }

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{ -webkit-appearance: none; margin: 0; }
input[type="number"]{ -moz-appearance: textfield; }

::-webkit-scrollbar{ display: none; }
* { scrollbar-width: none; }

.no-scroll{ overflow: hidden !important; }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}

:focus-visible{
  outline: 2px solid var(--brand);
  outline-offset: 2px;
  border-radius: 6px;
}
button:focus:not(:focus-visible){ outline: none; }

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.t-large-title{ font-size: 32px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; }
.t-title1{ font-size: 26px; font-weight: 800; letter-spacing: -.015em; line-height: 1.15; }
.t-title2{ font-size: 21px; font-weight: 800; letter-spacing: -.01em; line-height: 1.2; }
.t-title3{ font-size: 18px; font-weight: 750; letter-spacing: -.01em; line-height: 1.25; }
.t-headline{ font-size: 15px; font-weight: 700; line-height: 1.3; }
.t-body{ font-size: 15px; font-weight: 500; line-height: 1.45; }
.t-callout{ font-size: 14px; font-weight: 500; line-height: 1.4; }
.t-subhead{ font-size: 13px; font-weight: 600; line-height: 1.35; }
.t-footnote{ font-size: 12.5px; font-weight: 500; line-height: 1.4; }
.t-caption{ font-size: 11.5px; font-weight: 600; line-height: 1.3; }
.t-caption2{ font-size: 10.5px; font-weight: 700; line-height: 1.25; }

.t-eyebrow{
  font-size: 10.5px; font-weight: 800; letter-spacing: .07em;
  text-transform: uppercase; color: var(--text-tertiary);
}
.t-num{ font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
.t-mono-num{ font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; font-weight: 800; }

.text-primary{ color: var(--text-primary); }
.text-secondary{ color: var(--text-secondary); }
.text-tertiary{ color: var(--text-tertiary); }
.text-brand{ color: var(--brand-text); }
.text-danger{ color: var(--danger-strong); }
.text-gold{ color: var(--gold-strong); }
.truncate{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============================================================
   LAYOUT PRIMITIVES
   ============================================================ */
.app-shell{
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 560px;
  margin: 0 auto;
  width: 100%;
  position: relative;
}

.app-header{
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-t) + 14px) 20px 14px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border-subtle);
}
.app-header__brand{ display: flex; align-items: center; gap: 9px; }
.app-header__mark{
  width: 15px; height: 30px; border-radius: 7px;
  background: linear-gradient(160deg, var(--brand-strong), var(--brand));
  box-shadow: 0 0 16px var(--brand-ring);
  flex-shrink: 0;
}
.app-header__title{ font-size: 19px; font-weight: 800; letter-spacing: -.01em; }
.app-header__actions{ display: flex; gap: 8px; }

.icon-btn{
  width: 40px; height: 40px; border-radius: var(--radius-md);
  background: var(--bg-elevated); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: transform var(--dur-fast) var(--ease-standard), background var(--dur-fast);
  flex-shrink: 0;
}
.icon-btn svg{ width: 19px; height: 19px; }
.icon-btn:active{ transform: scale(.92); background: var(--bg-elevated-2); }

main.screen{
  flex: 1;
  padding: 18px 20px calc(96px + var(--safe-b));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-bar{
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  display: flex; justify-content: center;
}
.tab-bar__inner{
  display: flex; justify-content: space-around;
  width: 100%; max-width: 560px;
  padding: 8px 8px calc(8px + var(--safe-b));
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-top: 1px solid var(--border-subtle);
}
.tab-item{
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; width: 72px; height: 50px; border-radius: var(--radius-md);
  color: var(--text-tertiary);
  transition: color var(--dur-fast) var(--ease-standard), transform var(--dur-fast);
  position: relative;
}
.tab-item svg{ width: 24px; height: 24px; transition: transform var(--dur-base) var(--ease-spring); }
.tab-item span{ font-size: 10px; font-weight: 700; letter-spacing: .01em; }
.tab-item.active{ color: var(--brand-text); }
.tab-item.active svg{ transform: translateY(-1px) scale(1.05); }
.tab-item:active{ transform: scale(.92); }

/* ============================================================
   CARDS & SECTIONS
   ============================================================ */
.card{
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
}
.card + .card{ margin-top: 12px; }
.card-header{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
.card-link{ font-size: 11.5px; font-weight: 800; color: var(--brand-text); text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
.section-title{ font-size: 26px; font-weight: 800; letter-spacing: -.015em; margin-bottom: 3px; }
.section-sub{ font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.4; }

.stat-block{ background: var(--bg-elevated-2); border-radius: var(--radius-md); padding: 12px; }
.stat-block__label{ font-size: 10.5px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
.stat-block__value{ font-size: 19px; font-weight: 800; }

.progress-track{ width: 100%; height: 8px; border-radius: var(--radius-full); background: var(--bg-sunken); overflow: hidden; }
.progress-fill{ height: 100%; border-radius: var(--radius-full); background: linear-gradient(90deg, var(--brand), var(--brand-strong)); transition: width var(--dur-slow) var(--ease-out); }

.empty-state{
  text-align: center; padding: 36px 20px;
  background: var(--bg-elevated); border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
}
.empty-state__icon{
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--brand-wash); color: var(--brand-text);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.empty-state__icon svg{ width: 26px; height: 26px; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  appearance: none; border: none; border-radius: var(--radius-md);
  font-family: inherit; font-weight: 800; font-size: 14px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 16px; min-height: 44px;
  transition: transform var(--dur-fast) var(--ease-standard), opacity var(--dur-fast), background var(--dur-fast);
  white-space: nowrap;
}
.btn:active{ transform: scale(.96); }
.btn:disabled{ opacity: .4; pointer-events: none; }
.btn-block{ width: 100%; }
.btn-lg{ min-height: 54px; border-radius: var(--radius-lg); font-size: 15px; }

.btn-primary{ background: var(--brand); color: var(--text-on-brand); box-shadow: var(--shadow-brand); }
.btn-secondary{ background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); }
.btn-ghost{ background: var(--bg-elevated-2); color: var(--text-secondary); }
.btn-danger{ background: var(--danger-wash); color: var(--danger-strong); border: 1px solid transparent; }
.btn-outline-danger{ background: transparent; border: 1.5px solid var(--danger-wash); color: var(--danger-strong); }
.btn-sm{ min-height: 34px; padding: 7px 12px; font-size: 12px; border-radius: var(--radius-sm); }

/* ============================================================
   CHIPS / FILTERS
   ============================================================ */
.chip-row{ display: flex; gap: 7px; overflow-x: auto; padding: 2px 2px 6px; margin: 0 -2px; }
.chip{
  flex-shrink: 0; padding: 8px 13px; border-radius: var(--radius-full);
  background: var(--bg-elevated-2); color: var(--text-secondary);
  font-size: 12px; font-weight: 700; border: 1px solid transparent;
  transition: all var(--dur-fast) var(--ease-standard);
}
.chip.active{ background: var(--brand); color: var(--text-on-brand); }

/* ============================================================
   FORM FIELDS
   ============================================================ */
.field-label{ font-size: 11px; font-weight: 800; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 7px; }
.input{
  width: 100%; background: var(--bg-elevated-2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 13px 14px; font-size: 15px; font-weight: 600;
  color: var(--text-primary); font-family: inherit; transition: border-color var(--dur-fast);
}
.input:focus{ outline: none; border-color: var(--brand); }
.input::placeholder{ color: var(--text-tertiary); font-weight: 500; }
.textarea{ min-height: 90px; resize: vertical; font-weight: 500; line-height: 1.5; }
.search-field{ position: relative; }
.search-field .input{ padding-left: 38px; }
.search-field svg{ position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-tertiary); }

.segmented{ display: flex; background: var(--bg-elevated-2); border-radius: var(--radius-md); padding: 3px; gap: 2px; }
.segmented button{ flex: 1; background: transparent; border: none; border-radius: calc(var(--radius-md) - 3px); padding: 9px 6px; font-size: 12.5px; font-weight: 700; color: var(--text-secondary); transition: all var(--dur-fast) var(--ease-standard); }
.segmented button.active{ background: var(--bg-elevated); color: var(--text-primary); box-shadow: var(--shadow-sm); }

.stepper{ display: flex; align-items: center; gap: 0; background: var(--bg-elevated-2); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
.stepper button{ background: transparent; border: none; width: 38px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--brand-text); font-size: 18px; font-weight: 800; }
.stepper button:active{ background: var(--brand-wash); }
.stepper input{ width: 100%; text-align: center; background: transparent; border: none; font-size: 16px; font-weight: 800; color: var(--text-primary); font-family: inherit; padding: 0; }
.stepper input:focus{ outline: none; }

/* ============================================================
   SHEETS (bottom sheet modals — native iOS pattern)
   ============================================================ */
.sheet-overlay{
  position: fixed; inset: 0; z-index: 60;
  background: var(--overlay);
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-standard);
  display: flex; align-items: flex-end; justify-content: center;
}
.sheet-overlay.open{ opacity: 1; pointer-events: auto; }
.sheet{
  width: 100%; max-width: 560px; max-height: 88vh;
  background: var(--bg-elevated);
  border-radius: 24px 24px 0 0;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform var(--dur-slow) var(--ease-out);
  padding-bottom: var(--safe-b);
}
.sheet-overlay.open .sheet{ transform: translateY(0); }
.sheet-overlay.centered{ align-items: center; padding: 20px; }
.sheet-overlay.centered .sheet{ border-radius: var(--radius-xl); max-height: 84vh; transform: scale(.92) translateY(8px); opacity: 0; transition: transform var(--dur-base) var(--ease-spring), opacity var(--dur-base); }
.sheet-overlay.centered.open .sheet{ transform: scale(1) translateY(0); opacity: 1; }

.sheet__handle{ width: 36px; height: 4.5px; border-radius: var(--radius-full); background: var(--border); margin: 10px auto 2px; flex-shrink: 0; }
.sheet__header{ display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border-subtle); }
.sheet__title{ font-size: 17px; font-weight: 800; letter-spacing: -.01em; }
.sheet__close{ font-size: 13px; font-weight: 800; color: var(--brand-text); background: var(--bg-elevated-2); padding: 8px 14px; border-radius: var(--radius-full); border: none; }
.sheet__body{ padding: 16px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sheet__footer{ padding: 12px 20px calc(14px + var(--safe-b)); border-top: 1px solid var(--border-subtle); flex-shrink: 0; }

/* Confirm / prompt style sheets (compact, centered) */
.confirm-sheet{ text-align: center; padding: 26px 22px 18px; }
.confirm-sheet__icon{ width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.confirm-sheet__icon svg{ width: 24px; height: 24px; }
.confirm-sheet h3{ font-size: 17px; font-weight: 800; margin-bottom: 6px; }
.confirm-sheet p{ font-size: 13.5px; color: var(--text-secondary); line-height: 1.45; margin-bottom: 20px; }
.confirm-sheet__actions{ display: flex; gap: 8px; }

/* ============================================================
   TOASTS
   ============================================================ */
.toast-stack{ position: fixed; left: 0; right: 0; bottom: calc(84px + var(--safe-b)); z-index: 80; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; padding: 0 20px; }
.toast{
  display: flex; align-items: center; gap: 9px;
  background: color-mix(in srgb, var(--bg-elevated) 92%, transparent);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); box-shadow: var(--shadow-lg);
  padding: 12px 16px; border-radius: var(--radius-full);
  font-size: 13px; font-weight: 700; max-width: 100%;
  animation: toast-in var(--dur-base) var(--ease-spring) forwards;
}
.toast.leaving{ animation: toast-out var(--dur-fast) var(--ease-standard) forwards; }
.toast__icon{ width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; }
.toast--success .toast__icon{ background: var(--brand-wash); color: var(--brand-text); }
.toast--error .toast__icon{ background: var(--danger-wash); color: var(--danger-strong); }
.toast--info .toast__icon{ background: var(--bg-elevated-2); color: var(--text-secondary); }
@keyframes toast-in{ from{ opacity: 0; transform: translateY(14px) scale(.92); } to{ opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toast-out{ to{ opacity: 0; transform: translateY(8px) scale(.94); } }

/* ============================================================
   ACTIVE WORKOUT — sets, exercise cards
   ============================================================ */
.workout-bar{
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.workout-bar__time{ font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; }
.workout-bar__tools{ display: flex; gap: 8px; }

.exercise-card{
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px;
  position: relative; overflow: hidden;
  transition: transform var(--dur-base) var(--ease-standard), opacity var(--dur-base);
}
.exercise-card__head{ display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.exercise-card__name{ font-size: 14px; font-weight: 800; line-height: 1.3; }
.exercise-card__tag{ font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; background: var(--brand-wash); color: var(--brand-text); padding: 3px 8px; border-radius: var(--radius-full); flex-shrink: 0; white-space: nowrap; }

.set-row{ display: flex; align-items: center; gap: 6px; padding: 5px 0; transition: opacity var(--dur-base); }
.set-row.done{ opacity: .45; }
.set-row__idx{ width: 20px; font-size: 11px; font-weight: 800; color: var(--text-tertiary); text-align: center; flex-shrink: 0; }
.set-row__field{ display: flex; align-items: baseline; background: var(--bg-elevated-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 9px; height: 42px; flex: 1; min-width: 0; }
.set-row__field input{ background: transparent; border: none; width: 100%; min-width: 0; text-align: center; font-size: 15px; font-weight: 800; color: var(--text-primary); font-family: inherit; padding: 0; font-variant-numeric: tabular-nums; }
.set-row__field input:focus{ outline: none; }
.set-row__field input:disabled{ color: var(--text-tertiary); }
.set-row__field span{ font-size: 8.5px; font-weight: 800; color: var(--text-tertiary); flex-shrink: 0; }
.set-row__actions{ display: flex; gap: 5px; flex-shrink: 0; }
.set-row__btn{ width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--bg-elevated-2); border: 1px solid var(--border); color: var(--text-secondary); transition: transform var(--dur-fast), background var(--dur-fast), color var(--dur-fast); }
.set-row__btn:active{ transform: scale(.88); }
.set-row__btn svg{ width: 15px; height: 15px; }
.set-row__btn--note.has-note{ color: var(--brand-text); border-color: var(--brand-wash-strong); }
.set-row__btn--done{ background: var(--bg-elevated-2); }
.set-row__btn--done.checked{ background: linear-gradient(155deg, var(--brand-strong), var(--brand)); color: var(--text-on-brand); border-color: transparent; box-shadow: var(--shadow-brand); }
.set-row__note{ margin: 3px 0 4px 26px; }
.set-row__note input{ width: 100%; background: var(--bg-elevated-2); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--text-secondary); font-family: inherit; }
.set-row__note input:focus{ outline: none; border-color: var(--brand); }

.add-set-btn{ width: 100%; height: 42px; margin-top: 6px; border-radius: var(--radius-md); background: var(--bg-elevated-2); border: 1px dashed var(--border); font-size: 11.5px; font-weight: 800; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; gap: 5px; transition: all var(--dur-fast); }
.add-set-btn:active{ background: var(--brand-wash); color: var(--brand-text); border-color: transparent; }

.pr-flag{ display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 800; color: var(--gold-strong); background: var(--gold-wash); padding: 2px 6px; border-radius: var(--radius-full); margin-left: 6px; animation: pr-pop var(--dur-slow) var(--ease-spring); }
@keyframes pr-pop{ from{ transform: scale(0); opacity: 0; } to{ transform: scale(1); opacity: 1; } }

/* swipe-to-delete */
.swipe-item{ position: relative; overflow: hidden; border-radius: var(--radius-lg); }
.swipe-item__action{ position: absolute; top: 0; right: 0; bottom: 0; width: 84px; background: var(--danger-strong); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.swipe-item__content{ position: relative; background: var(--bg); transition: transform var(--dur-fast) var(--ease-standard); touch-action: pan-y; }

/* ============================================================
   ROUTINE CARDS / HOME DASHBOARD
   ============================================================ */
.hello-block{ margin-bottom: 18px; }
.hello-block__greeting{ font-size: 26px; font-weight: 800; letter-spacing: -.015em; }
.hello-block__sub{ font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

.quick-stats{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
.quick-stats .stat-block{ text-align: center; }
.quick-stats .stat-block__value{ font-size: 20px; }

.routine-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.routine-card{
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px; text-align: left; position: relative; overflow: hidden;
  transition: transform var(--dur-fast) var(--ease-standard);
  min-height: 108px; display: flex; flex-direction: column; justify-content: space-between;
}
.routine-card:active{ transform: scale(.96); }
.routine-card__icon{ width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--brand-wash); color: var(--brand-text); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; }
.routine-card__icon svg{ width: 16px; height: 16px; }
.routine-card__name{ font-size: 14px; font-weight: 800; line-height: 1.2; }
.routine-card__meta{ font-size: 10.5px; color: var(--text-tertiary); font-weight: 700; margin-top: 2px; }
.routine-card--ghost{ border-style: dashed; align-items: center; justify-content: center; text-align: center; color: var(--text-secondary); }
.routine-card--ghost .routine-card__icon{ background: var(--bg-elevated-2); color: var(--text-secondary); margin-bottom: 8px; }

/* ============================================================
   TIMER RING
   ============================================================ */
.timer-banner{
  position: fixed; left: 50%; top: calc(var(--safe-t) + 66px); transform: translateX(-50%) translateY(-12px);
  z-index: 55; width: min(86vw, 300px);
  background: color-mix(in srgb, var(--bg-elevated) 94%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg); padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-standard), transform var(--dur-base) var(--ease-spring);
}
.timer-banner.show{ opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.timer-ring{ position: relative; width: 52px; height: 52px; flex-shrink: 0; }
.timer-ring svg{ width: 100%; height: 100%; transform: rotate(-90deg); }
.timer-ring circle{ fill: none; }
.timer-ring .track{ stroke: var(--bg-elevated-2); }
.timer-ring .fill{ stroke: var(--brand); stroke-linecap: round; transition: stroke-dashoffset .3s linear; }
.timer-ring__label{ position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; font-variant-numeric: tabular-nums; }
.timer-banner__body{ flex: 1; min-width: 0; }
.timer-banner__title{ font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-tertiary); margin-bottom: 3px; }
.timer-banner__actions{ display: flex; gap: 6px; }
.timer-banner__actions button{ background: var(--bg-elevated-2); border: none; border-radius: var(--radius-sm); font-size: 11px; font-weight: 800; padding: 6px 9px; color: var(--text-secondary); }
.timer-banner__skip{ color: var(--danger-strong) !important; }

/* ============================================================
   PLATE CALCULATOR — signature visual
   ============================================================ */
.barbell-viz{ display: flex; align-items: center; justify-content: center; padding: 28px 4px 20px; overflow-x: auto; }
.barbell-viz__rack{ display: flex; align-items: center; }
.barbell-sleeve{ width: 26px; height: 10px; background: linear-gradient(180deg, #8a8a92, #5a5a60); border-radius: 2px; }
.barbell-bar{ width: 46px; height: 7px; background: linear-gradient(180deg, #9a9aa2, #6a6a70); }
.plate-stack{ display: flex; align-items: center; }
.plate-stack.mirror{ flex-direction: row-reverse; }
.plate{ border-radius: 5px; margin: 0 1px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
.plate__label{ font-size: 8px; font-weight: 800; writing-mode: vertical-rl; color: rgba(0,0,0,.55); }

.plate-legend{ display: flex; flex-wrap: wrap; gap: 6px 12px; justify-content: center; margin-top: 4px; }
.plate-legend__item{ display: flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; color: var(--text-secondary); }
.plate-legend__dot{ width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

.plate-breakdown{ display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }

.mini-chart .axis-label{ fill: var(--text-tertiary); font-size: 8.5px; font-weight: 700; font-family: var(--font-sans); }

.hidden{ display: none !important; }
.muscle-figure{ width: 100%; height: auto; }
.divider{ height: 1px; background: var(--border-subtle); margin: 12px 0; border: none; }
.list-row{ display: flex; align-items: center; justify-content: space-between; padding: 13px 2px; }
.list-row + .list-row{ border-top: 1px solid var(--border-subtle); }
.list-row__chevron{ color: var(--text-tertiary); font-size: 15px; }

.timeline-entry{ background: var(--bg-elevated-2); border-radius: var(--radius-md); padding: 11px 13px; }

.fade-in{ animation: fade-in var(--dur-base) var(--ease-out); }
@keyframes fade-in{ from{ opacity: 0; transform: translateY(6px); } to{ opacity: 1; transform: translateY(0); } }

.pop-in{ animation: pop-in var(--dur-base) var(--ease-spring); }
@keyframes pop-in{ from{ opacity: 0; transform: scale(.9); } to{ opacity: 1; transform: scale(1); } }

.shake{ animation: shake .35s var(--ease-standard); }

.celebrate-burst__badge{ background: var(--bg-elevated); border: 1px solid var(--border); box-shadow: var(--shadow-lg); border-radius: var(--radius-xl); padding: 22px 30px; text-align: center; animation: celebrate-pop 1.6s var(--ease-spring) forwards; }

/* ============================================================
   HELPERS GENERALES
   ============================================================ */
function $(id) { return document.getElementById(id); }

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatDisplayName(name) {
  if (!/^[a-zà-ÿ]/.test(name)) return name; // ya empieza en mayúscula u otro carácter: se deja tal cual
  return name.split(' ').map((word, i) => {
    const clean = word.toLowerCase();
    if (i > 0 && SPANISH_STOPWORDS.has(clean)) return clean;
    return clean.replace(/^([^a-zà-ÿ]*)([a-zà-ÿ])/, (m, pre, letter) => pre + letter.toUpperCase());
  }).join(' ');
}

function formatDateLong(d) {
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
}
function formatDateShort(d) {
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateWeekday(d) {
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}

function epley1RM(weight, reps) {
  const w = parseFloat(weight) || 0, r = parseInt(reps) || 0;
  if (w <= 0 || r <= 0) return 0;
  return r === 1 ? w : w * (1 + r / 30);
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function uid() { return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`; }

function vibrateLight() {
  if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
}

/* ---------- selector de archivos genérico (sin inputs fijos en el DOM) ---------- */
function pickFile({ accept = 'image/*', onFile }) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = accept;
  input.style.display = 'none';
  input.addEventListener('change', () => {
    const file = input.files && input.files[0];
    if (file) onFile(file);
    input.remove();
  });
  document.body.appendChild(input);
  input.click();
}

/* ---------- compresión de imágenes antes de guardarlas (evita agotar la cuota de almacenamiento) ---------- */
function compressImage(file, maxDim = 1080, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer la imagen'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Imagen no válida'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function showToast(message, type = 'success') {
  const stack = $('toast-stack');
  const el = document.createElement('div');
  el.className = `toast toast--${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
  el.innerHTML = `<span class="toast__icon">${icon}</span><span>${escapeHtml(message)}</span>`;
  stack.appendChild(el);
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 200);
  }, 2600);
}

/* ============================================================
   SWIPE PARA ELIMINAR (patrón nativo iOS)
   ============================================================ */
function enableSwipeToDelete(el, onDelete) {
  const content = el.querySelector('.swipe-item__content');
  if (!content) return;
  let startX = 0, currentX = 0, dragging = false, opened = false;
  const THRESHOLD = -64;

  content.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    dragging = true;
    content.style.transition = 'none';
  }, { passive: true });

  content.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentX = e.touches[0].clientX - startX;
    if (opened) currentX -= 84;
    currentX = Math.min(0, Math.max(-110, currentX));
    content.style.transform = `translateX(${currentX}px)`;
  }, { passive: true });

  content.addEventListener('touchend', () => {
    dragging = false;
    content.style.transition = '';
    if (currentX < THRESHOLD) {
      content.style.transform = 'translateX(-84px)';
      opened = true;
    } else {
      content.style.transform = 'translateX(0)';
      opened = false;
    }
  });

  const actionBtn = el.querySelector('.swipe-item__action');
  if (actionBtn) {
    actionBtn.addEventListener('click', () => onDelete());
  }
}

/* ============================================================
   CAPA DE DATOS — IndexedDB
   Todo el historial vive en local. Nunca sale del dispositivo.
   ============================================================ */
const DB_NAME = 'NacorGymDB';
const DB_VERSION = 3;
const STORES = ['workouts', 'exercises_history', 'body_history', 'exercise_objectives', 'monthly_objectives', 'routines', 'custom_exercises', 'exercise_photos', 'progress_photos'];

function initDatabase() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = (e) => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains('workouts')) idb.createObjectStore('workouts', { keyPath: 'id', autoIncrement: true });
      if (!idb.objectStoreNames.contains('exercises_history')) idb.createObjectStore('exercises_history', { keyPath: 'id', autoIncrement: true });
      if (!idb.objectStoreNames.contains('body_history')) idb.createObjectStore('body_history', { keyPath: 'id', autoIncrement: true });
      if (!idb.objectStoreNames.contains('exercise_objectives')) idb.createObjectStore('exercise_objectives', { keyPath: 'name' });
      if (!idb.objectStoreNames.contains('monthly_objectives')) idb.createObjectStore('monthly_objectives', { keyPath: 'month' });
      if (!idb.objectStoreNames.contains('routines')) idb.createObjectStore('routines', { keyPath: 'id', autoIncrement: true });
      if (!idb.objectStoreNames.contains('custom_exercises')) idb.createObjectStore('custom_exercises', { keyPath: 'name' });
      if (!idb.objectStoreNames.contains('exercise_photos')) idb.createObjectStore('exercise_photos', { keyPath: 'name' });
      if (!idb.objectStoreNames.contains('progress_photos')) idb.createObjectStore('progress_photos', { keyPath: 'key' });
    };

    request.onsuccess = (e) => { db = e.target.result; resolve(db); };
    request.onerror = (e) => { console.error('Error al abrir la base de datos', e); reject(e); };
  });
}

/* ---------- helpers CRUD genéricos (evitan repetir boilerplate de transacciones) ---------- */
function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
function dbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
function dbPut(storeName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readwrite');
    const req = tx.objectStore(storeName).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbAdd(storeName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readwrite');
    const req = tx.objectStore(storeName).add(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}
function dbClear(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([storeName], 'readwrite');
    const req = tx.objectStore(storeName).clear();
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

/* ---------- migración: localStorage antiguo (fotos en base64) -> IndexedDB ---------- */
async function migrateLegacyLocalStoragePhotos() {
  try {
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('photo_')) {
        const exerciseName = key.slice('photo_'.length);
        const dataUrl = localStorage.getItem(key);
        if (dataUrl) {
          await dbPut('exercise_photos', { name: exerciseName, photo: dataUrl });
          keysToRemove.push(key);
        }
      }
      if (key === 'photoA' || key === 'photoB') {
        const dataUrl = localStorage.getItem(key);
        if (dataUrl) {
          await dbPut('progress_photos', { key, photo: dataUrl, date: new Date().toISOString() });
          keysToRemove.push(key);
        }
      }
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
  } catch (err) {
    console.warn('No se pudo migrar fotos antiguas', err);
  }
}

/* ---------- estadísticas agregadas (para el panel de inicio y logros) ---------- */
function getWeekStart(date) {
  const d = new Date(date);
  const day = (d.getDay() + 6) % 7; // lunes = 0
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - day);
  return d;
}

function computeWeeklyStreak(workouts) {
  if (!workouts.length) return 0;
  const weeksWithWorkout = new Set(workouts.map(w => getWeekStart(w.rawDate).getTime()));
  let streak = 0;
  let cursor = getWeekStart(new Date());
  while (weeksWithWorkout.has(cursor.getTime())) {
    streak++;
    cursor = new Date(cursor.getTime() - 7 * 86400000);
  }
  return streak;
}

async function computeAggregateStats() {
  const workouts = await getAllWorkouts();
  let totalSets = 0, totalVolume = 0, totalPRs = 0;
  workouts.forEach(w => {
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        totalSets++;
        totalVolume += (parseFloat(s.peso) || 0) * (parseInt(s.reps) || 0);
        if (s.pr) totalPRs++;
      });
    });
  });
  const thisWeekStart = getWeekStart(new Date()).getTime();
  const workoutsThisWeek = workouts.filter(w => getWeekStart(w.rawDate).getTime() === thisWeekStart).length;
  const lastWorkout = workouts.length ? workouts[workouts.length - 1] : null;
  const daysSinceLast = lastWorkout ? Math.floor((Date.now() - new Date(lastWorkout.rawDate).getTime()) / 86400000) : null;

  return {
    totalWorkouts: workouts.length,
    totalSets, totalVolume, totalPRs,
    streakWeeks: computeWeeklyStreak(workouts),
    workoutsThisWeek,
    daysSinceLast,
    lastWorkout
  };
}

function ringSVG(pct, size, strokeW, label) {
  const r = (size - strokeW) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(1, pct));
  return `
    <div class="timer-ring" style="width:${size}px;height:${size}px">
      <svg viewBox="0 0 ${size} ${size}">
        <circle class="track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${strokeW}"></circle>
        <circle class="fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${strokeW}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="timer-ring__label" style="font-size:${size*0.24}px">${label}</div>
    </div>`;
}

/* ============================================================
   INICIO / GESTIÓN DE ENTRENO ACTIVO
   ============================================================ */
function beginWorkoutTimer() {
  workoutSecondsElapsed = 0;
  clearInterval(workoutTimerInterval);
  workoutTimerInterval = setInterval(() => {
    workoutSecondsElapsed++;
    const display = $('workout-duration');
    if (display) {
      const mins = Math.floor(workoutSecondsElapsed / 60).toString().padStart(2, '0');
      const secs = (workoutSecondsElapsed % 60).toString().padStart(2, '0');
      display.textContent = `${mins}:${secs}`;
    }
  }, 1000);
}

function startDynamicWorkout() {
  activeWorkout = { routine: 'Sesión Libre', date: new Date().toISOString(), exercises: [] };
  activeRoutineName = null;
  beginWorkoutTimer();
  renderTabContent();
}

async function startRoutineWorkout(routineId) {
  const routines = await getRoutines();
  const routine = routines.find(r => r.id === routineId);
  if (!routine) { showToast('No se encontró la rutina', 'error'); return; }

  activeWorkout = { routine: routine.name, date: new Date().toISOString(), exercises: [] };
  activeRoutineName = routine.name;

  for (const exName of routine.exerciseNames) {
    if (!EXERCISE_METADATA[exName]) continue; // por si se eliminó un ejercicio personalizado
    const lastSession = await getLastExerciseSession(exName);
    const priorBest = await getExerciseAllTimeBest(exName);
    activeWorkout.exercises.push({
      name: exName,
      priorBest,
      sets: lastSession ? lastSession.sets.map(s => ({ peso: s.peso, reps: s.reps, note: '', done: false })) : [{ peso: '', reps: '', note: '', done: false }]
    });
  }
  beginWorkoutTimer();
  renderTabContent();
  showToast(`${routine.name} — todo listo`, 'success');
}

async function saveCurrentWorkoutAsRoutine() {
  if (!activeWorkout || activeWorkout.exercises.length === 0) {
    showToast('Añade algún ejercicio primero', 'error');

  const exerciseNames = activeWorkout.exercises.map(e => e.name);
  openMainSheet({

    centered: true,

}

function toggleSetDone(exIdx, setIdx) {
  const ex = activeWorkout.exercises[exIdx];
  const set = ex.sets[setIdx];
  const pesoEl = $(`peso-${exIdx}-${setIdx}`);
  const repsEl = $(`reps-${exIdx}-${setIdx}`);
  const noteEl = $(`note-${exIdx}-${setIdx}`);

  if (!set.done) {
    set.peso = pesoEl.value !== '' ? parseFloat(pesoEl.value) : '';
    set.reps = repsEl.value !== '' ? parseInt(repsEl.value, 10) : '';
    set.note = noteEl.value;

    if (set.peso === '' || set.reps === '') {
      $(`set-row-${exIdx}-${setIdx}`).classList.add('shake');
      setTimeout(() => $(`set-row-${exIdx}-${setIdx}`)?.classList.remove('shake'), 350);
      return;
    }

    const est1RM = epley1RM(set.peso, set.reps);
    if (ex.priorBest && est1RM > 0 && est1RM > ex.priorBest.best1RM) {
      set.pr = true;
      ex.priorBest.best1RM = est1RM;
      if (set.peso > ex.priorBest.maxWeight) ex.priorBest.maxWeight = set.peso;
      celebrate('🏆', '¡Nuevo récord personal!');
    }
    set.done = true;
    startTimer(appSettings.restSeconds || DEFAULT_REST_SECONDS);
  } else {
    set.done = false;
    set.pr = false;
  }
  renderTabContent();
}

/* ============================================================
   TEMPORIZADOR DE DESCANSO
   ============================================================ */
const TIMER_RING_CIRC = 2 * Math.PI * 22;

function formatTimerLabel(totalSeconds) {
  const s = Math.max(0, totalSeconds);
  const mins = Math.floor(s / 60);
  const secs = (s % 60).toString().padStart(2, '0');
  return `${mins}:${secs}`;
}

function startTimer(seconds) {
  clearInterval(timerInterval);
  timerSecondsLeft = seconds;
  timerTotalSeconds = seconds;
  $('timer-banner').classList.add('show');
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    timerSecondsLeft--;
    updateTimerDisplay();
    if (timerSecondsLeft <= 0) {
      clearInterval(timerInterval);
      $('timer-banner').classList.remove('show');
    }
  }, 1000);
}

function adjustTimer(amount) {
  if (!timerInterval) return;
  timerSecondsLeft = Math.max(0, timerSecondsLeft + amount);
  if (timerSecondsLeft > timerTotalSeconds) timerTotalSeconds = timerSecondsLeft;
  updateTimerDisplay();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  $('timer-banner')?.classList.remove('show');
}

function updateTimerDisplay() {
  $('timer-display').textContent = formatTimerLabel(timerSecondsLeft);
  const pct = timerTotalSeconds > 0 ? timerSecondsLeft / timerTotalSeconds : 0;
  $('timer-ring-fill').setAttribute('stroke-dashoffset', String(TIMER_RING_CIRC * (1 - pct)));
}

   ============================================================ */
async function updateMonthlyObjectiveVolume(workout) {
  const obj = await getCurrentMonthlyObjective();
  obj.daysDone += 1;
  let volume = 0, backSets = 0;
  workout.exercises.forEach(ex => {
    const meta = EXERCISE_METADATA[ex.name] || {};
    ex.sets.forEach(s => {
      volume += (parseFloat(s.peso) || 0) * (parseInt(s.reps) || 0);
      if (meta.muscle === 'Espalda') backSets++;
    });
  });
  obj.volDone += volume;
  obj.setsDone += backSets;
  await dbPut('monthly_objectives', obj);
}

async function finishWorkout() {
  syncActiveWorkoutInputsFromDOM();

  const exercises = activeWorkout.exercises
    .map(ex => ({ name: ex.name, sets: ex.sets.filter(s => s.done).map(s => ({ peso: s.peso, reps: s.reps, note: s.note || '', pr: !!s.pr })) }))
    .filter(ex => ex.sets.length > 0);

  if (exercises.length === 0) {
    showToast('Marca al menos una serie como hecha (✓)', 'error');
    return;
  }

  const statsBefore = await computeAggregateStats();

  const mins = Math.floor(workoutSecondsElapsed / 60).toString().padStart(2, '0');
  const secs = (workoutSecondsElapsed % 60).toString().padStart(2, '0');
  const now = new Date();
  const workoutToSave = {
    routine: activeWorkout.routine,
    date: formatDateShort(now),
    rawDate: now.toISOString(),
    duration: `${mins}:${secs}`,
    exercises
  };

  await dbAdd('workouts', workoutToSave);
  for (const ex of exercises) {
    await dbAdd('exercises_history', { exerciseName: ex.name, date: workoutToSave.date, rawDate: workoutToSave.rawDate, sets: ex.sets });
  }
  await updateMonthlyObjectiveVolume(workoutToSave);

  activeWorkout = null;
  activeRoutineName = null;
  clearInterval(workoutTimerInterval);
  stopTimer();

  const totalSets = exercises.reduce((n, ex) => n + ex.sets.length, 0);
  const totalVol = exercises.reduce((n, ex) => n + ex.sets.reduce((m, s) => m + (parseFloat(s.peso) || 0) * (parseInt(s.reps) || 0), 0), 0);

  const statsAfter = await computeAggregateStats();
  const newlyUnlocked = ACHIEVEMENTS.find(a => !a.test(statsBefore) && a.test(statsAfter));

  switchTab('entrenar');
  if (newlyUnlocked) {
    celebrate(newlyUnlocked.emoji, `Logro desbloqueado: ${newlyUnlocked.name}`);
  } else {
    celebrate('💪', 'Sesión guardada');
  }
  showToast(`${totalSets} series · ${totalVol.toLocaleString('es-ES')} kg movidos`, 'success');
}

/* ============================================================
   CALCULADORA DE DISCOS — elemento visual distintivo de la app
   ============================================================ */
const PLATE_DIMENSIONS = { 25: { h: 88, w: 15 }, 20: { h: 78, w: 14 }, 15: { h: 68, w: 13 }, 10: { h: 58, w: 12 }, 5: { h: 46, w: 10 }, 2.5: { h: 36, w: 8 }, 1.25: { h: 30, w: 7 } };

function computePlatesPerSide(perSideTarget) {
  let remaining = Math.round(perSideTarget * 4) / 4; // redondeo a 0.25kg
  const used = [];
  for (const plate of PLATE_SIZES) {
    let count = 0;
    while (remaining >= plate.kg - 1e-6) {
      remaining -= plate.kg;
      count++;
    }
    if (count > 0) used.push({ ...plate, count });
  }
  const achievedPerSide = used.reduce((sum, p) => sum + p.kg * p.count, 0);
  return { used, achievedPerSide, leftover: Math.max(0, remaining) };
}

function renderPlateResult(targetWeight, barWeight) {
  const perSideTarget = Math.max(0, (targetWeight - barWeight) / 2);
  const { used, achievedPerSide, leftover } = computePlatesPerSide(perSideTarget);
  const achievedTotal = barWeight + achievedPerSide * 2;

  const plateEls = used.flatMap(p => Array.from({ length: p.count }, () => p)).sort((a, b) => b.kg - a.kg);
  const renderStack = (mirror) => plateEls.map(p => {
    const dim = PLATE_DIMENSIONS[p.kg];
    return `<div class="plate" style="height:${dim.h}px;width:${dim.w}px;background:${p.color};"><span class="plate__label" style="color:${p.textColor}">${p.kg}</span></div>`;
  }).join('');

  const legend = used.map(p => `<div class="plate-legend__item"><span class="plate-legend__dot" style="background:${p.color}"></span>${p.kg}kg × ${p.count}/lado</div>`).join('');

  const breakdown = used.length
    ? used.map(p => `<div class="plate-breakdown__row"><span>${p.kg} kg</span><span class="text-secondary">× ${p.count} por lado</span></div>`).join('')
    : `<p class="t-footnote text-tertiary" style="text-align:center;">Con esta barra ya alcanzas el peso objetivo.</p>`;

  const diffNote = Math.abs(achievedTotal - targetWeight) > 0.05
    ? `<p class="t-footnote text-tertiary" style="text-align:center;margin-top:8px;">Peso más aproximado con discos estándar (objetivo: ${targetWeight} kg)</p>`
    : '';

  $('plate-result').innerHTML = `
    <div class="barbell-viz">
      <div class="barbell-viz__rack">
        <div class="plate-stack mirror">${renderStack(true)}</div>
        <div class="barbell-sleeve"></div>
        <div class="barbell-bar"></div>
        <div class="barbell-sleeve"></div>
        <div class="plate-stack">${renderStack(false)}</div>
      </div>
    </div>
    <div class="plate-legend">${legend}</div>
    <div class="t-title2" style="text-align:center;margin-top:14px;">${achievedTotal.toLocaleString('es-ES')} kg</div>
    <div class="t-caption text-tertiary" style="text-align:center;">barra de ${barWeight} kg + ${achievedPerSide.toLocaleString('es-ES')} kg por lado</div>
    ${diffNote}
    <div class="plate-breakdown">${breakdown}</div>
  `;
}

function openPlateCalculator() {
  openMainSheet({
    title: 'Calculadora de discos',
    bodyHTML: `
      <div class="field-label">Peso objetivo (kg)</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <input type="number" inputmode="decimal" id="plate-target-input" class="input" placeholder="Ej. 80">
      </div>

      const input = $('plate-target-input');

        const target = parseFloat(input.value);
        if (!isNaN(target) && target >= 0) renderPlateResult(target, barWeight);

      input.addEventListener('input', debounce(recalcPlates, 150));

/* ============================================================
   CALCULADORA DE CALENTAMIENTO
   ============================================================ */
function computeWarmupSets(targetWeight) {
  const steps = [{ pct: 0.4, reps: 8 }, { pct: 0.6, reps: 5 }, { pct: 0.8, reps: 3 }, { pct: 0.9, reps: 1 }];
  return steps
    .map(s => ({ weight: Math.round((targetWeight * s.pct) / 1.25) * 1.25, reps: s.reps }))
    .filter(s => s.weight > 0 && s.weight < targetWeight);
}

function renderWarmupResult(targetWeight) {
  const steps = computeWarmupSets(targetWeight);
  const rows = steps.map((s, i) => `
    <div class="plate-breakdown__row">
      <span>Serie ${i + 1}</span>
      <span class="text-secondary">${s.weight.toLocaleString('es-ES')} kg × ${s.reps} rep</span>
    </div>
  `).join('');
  $('warmup-result').innerHTML = `
    <div class="plate-breakdown">
      ${rows || '<p class="t-footnote text-tertiary" style="text-align:center;">Peso demasiado ligero para necesitar calentamiento progresivo.</p>'}
      <div class="plate-breakdown__row" style="background:var(--brand-wash);">
        <span class="text-brand" style="font-weight:800;">Serie de trabajo</span>
        <span class="text-brand" style="font-weight:800;">${targetWeight.toLocaleString('es-ES')} kg</span>
      </div>
    </div>
  `;
}

let gymFilterMuscle = 'Todos';

function exerciseNote(name) { return localStorage.getItem(`tips_${name}`) || ''; }
function setExerciseNoteLS(name, text) { localStorage.setItem(`tips_${name}`, text); }

function renderExerciseList(container) {
  container.innerHTML = `
    <div class="section-title">Gimnasio</div>
    <div class="section-sub">${ALL_EXERCISES.length} ejercicios en tu catálogo</div>

    <div class="t-eyebrow" style="margin-bottom:6px;">Equipamiento</div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" id="gym-search" class="input" placeholder="Buscar ejercicio…" autocomplete="off">
    </div>
    <div id="gym-list"></div>
    <button class="btn btn-ghost btn-block" style="margin-top:14px;" onclick="openCustomExerciseForm()">+ Crear ejercicio personalizado</button>
  `;
  renderFilterChips('gym-equip-row', EQUIP_OPTIONS, gymFilterEquip, v => { gymFilterEquip = v; renderGymList(); });
  renderFilterChips('gym-muscle-row', MUSCLE_OPTIONS, gymFilterMuscle, v => { gymFilterMuscle = v; renderGymList(); });
  $('gym-search').addEventListener('input', debounce(renderGymList, 120));
  renderGymList();

function renderGymList() {
  const searchVal = ($('gym-search')?.value || '').toLowerCase().trim();
  const listEl = $('gym-list');
  const matches = ALL_EXERCISES.filter(name => {
    const meta = EXERCISE_METADATA[name] || { equip: 'Otros', muscle: 'Otros' };
    if (gymFilterEquip !== 'Todos' && meta.equip !== gymFilterEquip) return false;
    if (gymFilterMuscle !== 'Todos' && meta.muscle !== gymFilterMuscle) return false;
    if (searchVal && !name.toLowerCase().includes(searchVal)) return false;
    return true;
  });

  if (matches.length === 0) {
    listEl.innerHTML = `<p class="t-footnote text-tertiary" style="text-align:center;padding:24px 0;">Sin resultados${searchVal ? ` para "${escapeHtml(searchVal)}"` : ''}.</p>`;
    return;
  }

  listEl.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card';
  card.style.padding = '4px 12px';
  matches.forEach(name => {
    const meta = EXERCISE_METADATA[name] || { equip: 'Otros', muscle: 'Otros' };
    const row = document.createElement('div');
    row.className = 'list-row';
    row.style.cursor = 'pointer';
    row.innerHTML = `
      <div style="min-width:0;">
        <div class="t-subhead truncate">${escapeHtml(formatDisplayName(name))}${meta.custom ? ' <span class="badge">Tuyo</span>' : ''}</div>
        <div style="display:flex;gap:4px;margin-top:4px;"><span class="badge">${meta.equip}</span><span class="badge">${meta.muscle}</span></div>
      </div>
      <span class="list-row__chevron">›</span>
    `;
    row.addEventListener('click', () => renderExerciseDetail(name));
    card.appendChild(row);
  });
  listEl.appendChild(card);
}

function buildWeightChartSVG(entries) {
  if (entries.length === 0) return `<p class="t-footnote text-tertiary" style="text-align:center;padding:20px 0;">Aún no has registrado tu peso.</p>`;
  const W = 300, H = 110, PAD = 8;
  const weights = entries.map(e => e.weight);
  const min = Math.min(...weights), max = Math.max(...weights);
  const range = max - min || 1;

  const points = entries.map((e, i) => {
    const x = entries.length === 1 ? W / 2 : PAD + (i / (entries.length - 1)) * (W - PAD * 2);
    const y = PAD + (1 - (e.weight - min) / range) * (H - PAD * 2);
    return { x, y, weight: e.weight };
  });

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L${points[points.length - 1].x.toFixed(1)},${H - PAD} L${points[0].x.toFixed(1)},${H - PAD} Z`;
  const dots = points.map(p => `<circle class="pt" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3"></circle>`).join('');

  return `
    <svg viewBox="0 0 ${W} ${H}" class="mini-chart">
      <defs><linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" style="stop-color:var(--brand)" stop-opacity="0.28"/>
        <stop offset="100%" style="stop-color:var(--brand)" stop-opacity="0"/>
      </linearGradient></defs>
      <line class="grid-line" x1="0" y1="${H/2}" x2="${W}" y2="${H/2}"></line>
      <path class="area" d="${areaPath}"></path>
      <path class="line" d="${linePath}"></path>
      ${dots}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:2px;">
      <span class="t-caption2 text-tertiary">${escapeHtml(entries[0].date)}</span>
      <span class="t-caption2 text-tertiary">${escapeHtml(entries[entries.length - 1].date)}</span>
    </div>
  `;
}

/* ---------- correlación físico / entrenamiento (heurística informativa) ---------- */
async function renderCorrelationInsight(bodyHistory) {
  const workouts = await getAllWorkouts();
  const card = $('correlation-card');
  if (!card) return;

  const weighted = bodyHistory.filter(h => h.weight != null);
  if (weighted.length < 2 || workouts.length < 2) {
    card.innerHTML = `<div class="card-header"><span class="t-title3">🔬 Correlación</span></div><p class="t-footnote text-tertiary">Registra más sesiones y pesajes para desbloquear este análisis.</p>`;
    return;
  }

  const recentWeight = weighted.slice(-4);
  const weightTrend = recentWeight[recentWeight.length - 1].weight - recentWeight[0].weight;

  const halfPoint = new Date(workouts[Math.floor(workouts.length / 2)].rawDate);
  const firstHalfVol = workouts.filter(w => new Date(w.rawDate) < halfPoint).reduce((sum, w) => sum + w.exercises.reduce((s, e) => s + e.sets.reduce((x, st) => x + (parseFloat(st.peso)||0)*(parseInt(st.reps)||0), 0), 0), 0);
  const secondHalfVol = workouts.filter(w => new Date(w.rawDate) >= halfPoint).reduce((sum, w) => sum + w.exercises.reduce((s, e) => s + e.sets.reduce((x, st) => x + (parseFloat(st.peso)||0)*(parseInt(st.reps)||0), 0), 0), 0);
  const volTrend = secondHalfVol - firstHalfVol;

  let title, text;
  if (weightTrend > 0.3 && volTrend > 0) { title = 'Etapa de volumen'; text = 'Tu peso y tu volumen de entrenamiento suben a la vez — coherente con una fase de ganancia de masa.'; }
  else if (weightTrend < -0.3 && volTrend >= 0) { title = 'Definición eficiente'; text = 'Estás perdiendo peso mientras mantienes o subes el volumen de entrenamiento — buena señal de recomposición.'; }
  else if (weightTrend < -0.3 && volTrend < 0) { title = 'Posible déficit agresivo'; text = 'El peso y el rendimiento bajan juntos — vigila que la recuperación y la ingesta sean suficientes.'; }
  else { title = 'Mantenimiento estable'; text = 'Tu peso corporal se mantiene estable en relación a tu volumen de entrenamiento reciente.'; }

  card.innerHTML = `<div class="card-header"><span class="t-title3">🔬 ${title}</span></div><p class="t-callout text-secondary">${text}</p>`;
}

/* ============================================================
   PESTAÑA REPORTES — historial, logros y exportación
   ============================================================ */

        <div class="t-caption2" style="line-height:1.25;">${a.name}</div>

  }).join('');

    <div class="section-title">Reportes</div>

        <div class="t-subhead text-gold" style="margin-bottom:3px;">⚠️ Sin copia de seguridad reciente</div>

      <div class="stat-block"><div class="stat-block__label">Series</div><div class="stat-block__value">${stats.totalSets}</div></div>
      <div class="stat-block"><div class="stat-block__label">Volumen</div><div class="stat-block__value">${(stats.totalVolume/1000).toFixed(1)}t</div></div>

    <div class="card">
      <div class="card-header"><span class="t-title3">🏅 Logros</span></div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">${achievementsHTML}</div>
    </div>

    <div class="card-header" style="margin-top:4px;"><span class="t-title3">Historial de sesiones</span></div>
    <div id="session-history-list"></div>

    <div class="card-header" style="margin-top:14px;"><span class="t-title3">Exportar</span></div>
    <div class="card" style="display:flex;flex-direction:column;gap:8px;">

      <button class="btn btn-secondary btn-block" id="print-report-btn">🖨️ Imprimir informe (PDF)</button>
      <div class="divider"></div>

async function renderSessionHistoryList() {
  const listEl = $('session-history-list');
  if (!listEl) return;
  const workouts = (await getAllWorkouts()).slice().reverse().slice(0, 40);

  if (workouts.length === 0) {
    listEl.innerHTML = `<p class="t-footnote text-tertiary" style="text-align:center;padding:18px 0;">Todavía no has completado ninguna sesión.</p>`;
    return;
  }

  listEl.innerHTML = workouts.map(w => {
    const totalSets = w.exercises.reduce((n, e) => n + e.sets.length, 0);
    return `
      <div class="swipe-item" data-workout-id="${w.id}" style="margin-bottom:8px;">
        <div class="swipe-item__action">Eliminar</div>
        <div class="swipe-item__content">
          <div class="list-row" style="padding:12px 14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;">
            <div>
              <div class="t-subhead">${escapeHtml(w.routine)}</div>
              <div class="t-caption2 text-tertiary" style="margin-top:2px;">${escapeHtml(w.date)} · ${w.exercises.length} ejercicios · ${totalSets} series · ${w.duration}</div>
            </div>
            <span class="list-row__chevron">›</span>
          </div>
        </div>
      </div>`;
  }).join('');

  document.querySelectorAll('#session-history-list .swipe-item').forEach(item => {
    const id = parseInt(item.dataset.workoutId, 10);
    item.querySelector('.list-row').addEventListener('click', () => openSessionDetail(id));
    enableSwipeToDelete(item, () => confirmDeleteWorkout(id));
  });
}

async function openSessionDetail(workoutId) {
  const w = await dbGet('workouts', workoutId);
  if (!w) return;
  const body = w.exercises.map(ex => `
    <div style="margin-bottom:14px;">
      <div class="t-subhead" style="margin-bottom:6px;">${escapeHtml(formatDisplayName(ex.name))}</div>
      ${ex.sets.map(s => `<div class="t-footnote text-secondary" style="padding:3px 0;">${s.peso} kg × ${s.reps} rep${s.pr ? ' &nbsp;🏆' : ''}${s.note ? ` — <span class="text-tertiary">${escapeHtml(s.note)}</span>` : ''}</div>`).join('')}
    </div>
  `).join('');

  openMainSheet({
    title: w.routine,
    bodyHTML: `<p class="t-footnote text-tertiary" style="margin-bottom:16px;">${escapeHtml(w.date)} · Duración ${w.duration}</p>${body}`,
    footerHTML: `<button class="btn btn-outline-danger btn-block" id="delete-session-btn">Eliminar esta sesión</button>`,
    onOpen: () => $('delete-session-btn').addEventListener('click', () => { closeMainSheet(); confirmDeleteWorkout(workoutId); })
  });
}

async function confirmDeleteWorkout(workoutId) {
  const ok = await openConfirmSheet({ icon: '🗑️', title: 'Eliminar sesión', message: 'Se eliminará esta sesión y su historial asociado por ejercicio.', confirmLabel: 'Eliminar', danger: true });
  if (!ok) return;
  const w = await dbGet('workouts', workoutId);
  await dbDelete('workouts', workoutId);
  if (w) {
    const allHistory = await dbGetAll('exercises_history');
    const toDelete = allHistory.filter(h => h.rawDate === w.rawDate);
    for (const h of toDelete) await dbDelete('exercises_history', h.id);
  }
  showToast('Sesión eliminada', 'success');
  renderTabContent();
}

/* ============================================================
   EXPORTACIÓN E IMPORTACIÓN
   ============================================================ */
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    return false;
  }
}

async function exportAsText() {
  const workouts = await getAllWorkouts();
  if (workouts.length === 0) { showToast('No hay sesiones para exportar', 'error'); return; }
  const w = workouts[workouts.length - 1];
  let text = `NacorGym — ${w.routine}\n${w.date} · ${w.duration}\n\n`;
  w.exercises.forEach(ex => {
    text += `${formatDisplayName(ex.name)}\n`;
    ex.sets.forEach(s => { text += `  ${s.peso}kg × ${s.reps}${s.pr ? ' 🏆' : ''}${s.note ? ` (${s.note})` : ''}\n`; });
    text += '\n';
  });
  const ok = await copyToClipboard(text);
  showToast(ok ? 'Resumen copiado al portapapeles' : 'No se pudo copiar', ok ? 'success' : 'error');
}

async function exportAsCSV() {
  const history = await dbGetAll('exercises_history');
  if (history.length === 0) { showToast('No hay historial para exportar', 'error'); return; }
  let csv = 'Fecha,Ejercicio,Peso(kg),Repeticiones,PR,Nota\n';
  history.sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate)).forEach(h => {
    h.sets.forEach(s => {
      const row = [h.date, `"${h.exerciseName.replace(/"/g, '""')}"`, s.peso, s.reps, s.pr ? 'Sí' : 'No', `"${(s.note || '').replace(/"/g, '""')}"`];
      csv += row.join(',') + '\n';
    });
  });
  downloadFile(`nacorgym_historial_${Date.now()}.csv`, csv, 'text/csv;charset=utf-8');
  showToast('CSV descargado', 'success');
}

async function exportBackupJSON() {
  const backup = {};
  for (const store of STORES) backup[store] = await dbGetAll(store);
  backup.__meta = { app: 'NacorGym', exportedAt: new Date().toISOString(), version: DB_VERSION };
  downloadFile(`nacorgym_backup_${Date.now()}.json`, JSON.stringify(backup, null, 2), 'application/json');
  appSettings.lastBackup = new Date().toISOString();
  persistSettings();
  showToast('Copia de seguridad descargada', 'success');
  renderTabContent();
}

function importBackupJSON() {
  pickFile({
    accept: 'application/json,.json',
    onFile: (file) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.__meta || data.__meta.app !== 'NacorGym') { showToast('El archivo no es una copia de seguridad válida', 'error'); return; }
          const ok = await openConfirmSheet({ icon: '📥', title: 'Restaurar copia de seguridad', message: 'Esto reemplazará todos tus datos actuales por los del archivo. Esta acción no se puede deshacer.', confirmLabel: 'Restaurar', danger: true });
          if (!ok) return;
          for (const store of STORES) {
            await dbClear(store);
            if (Array.isArray(data[store])) {
              for (const item of data[store]) await dbPut(store, item);
            }
          }
          await loadCustomExercises();
          showToast('Copia de seguridad restaurada', 'success');
          renderTabContent();
        } catch (err) {
          showToast('No se pudo leer el archivo', 'error');
        }
      };
      reader.readAsText(file);
    }
  });
}

async function printFullReport() {
  const workouts = (await getAllWorkouts()).slice().reverse();
  const stats = await computeAggregateStats();
  const sessionsHTML = workouts.map(w => `
    <div class="p-session">
      <h3>${escapeHtml(w.routine)} — ${escapeHtml(w.date)} (${w.duration})</h3>
      ${w.exercises.map(ex => `
        <div class="p-ex">${escapeHtml(formatDisplayName(ex.name))}</div>
        ${ex.sets.map(s => `<div class="p-set">${s.peso} kg × ${s.reps} rep${s.pr ? ' — récord personal' : ''}${s.note ? ` — ${escapeHtml(s.note)}` : ''}</div>`).join('')}
      `).join('')}
    </div>
  `).join('');

  $('print-report').innerHTML = `
    <h1>NacorGym — Informe de entrenamientos</h1>
    <div class="p-sub">Generado el ${formatDateLong(new Date())} · ${stats.totalWorkouts} sesiones · ${stats.totalSets} series · ${stats.totalVolume.toLocaleString('es-ES')} kg movidos en total</div>
    ${sessionsHTML || '<p>Sin sesiones registradas.</p>'}
  `;
  window.print();
}

function openSettingsSheet() {
  openMainSheet({ title: 'Ajustes', bodyHTML: settingsBodyHTML(), onOpen: bindSettingsHandlers });
}
function renderSettingsSheetBody() {
  $('sheet-main-body').innerHTML = settingsBodyHTML();
  bindSettingsHandlers();
}
function bindSettingsHandlers() {
  $('theme-segmented').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.dataset.val));
  });
  const restOptions = [60, 90, 120, 150].map(s => `${s}s`);
  renderFilterChips('rest-chip-row', restOptions, `${appSettings.restSeconds || DEFAULT_REST_SECONDS}s`, (v) => {
    appSettings.restSeconds = parseInt(v, 10); persistSettings();
  });
  const goalOptions = [2, 3, 4, 5, 6].map(n => `${n}`);
  renderFilterChips('weekly-goal-row', goalOptions, `${appSettings.weeklyGoal || 4}`, (v) => {
    appSettings.weeklyGoal = parseInt(v, 10); persistSettings();
  });
  $('settings-backup-btn').addEventListener('click', exportBackupJSON);
  $('settings-restore-btn').addEventListener('click', importBackupJSON);
  $('settings-reset-btn').addEventListener('click', confirmResetAllData);
}

async function confirmResetAllData() {
  const ok = await openConfirmSheet({
    icon: '⚠️', title: 'Borrar todos los datos', message: 'Se eliminará permanentemente todo tu historial, rutinas, objetivos y fotos. Considera exportar una copia de seguridad antes.',
    confirmLabel: 'Borrar todo', danger: true
  });
  if (!ok) return;
  const ok2 = await openConfirmSheet({ icon: '⚠️', title: '¿Estás totalmente seguro?', message: 'Esta acción es irreversible.', confirmLabel: 'Sí, borrar todo', danger: true });
  if (!ok2) return;
  for (const store of STORES) await dbClear(store);
  localStorage.clear();
  showToast('Datos eliminados', 'success');
  location.reload();
}

/* ============================================================
   ARRANQUE DE LA APLICACIÓN
   ============================================================ */
function enableSheetDragDismiss(handleEl, sheetEl, closeFn) {
  let startY = 0, dragging = false;
  handleEl.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; dragging = true; sheetEl.style.transition = 'none'; }, { passive: true });
  handleEl.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const delta = Math.max(0, e.touches[0].clientY - startY);
    sheetEl.style.transform = `translateY(${delta}px)`;
  }, { passive: true });
  handleEl.addEventListener('touchend', (e) => {
    dragging = false;
    sheetEl.style.transition = '';
    const delta = e.changedTouches[0].clientY - startY;
    sheetEl.style.transform = '';
    if (delta > 90) closeFn();
  });
}

async function initApp() {
  loadSettings();
  applyTheme();

  try {
    await initDatabase();
    await migrateLegacyLocalStoragePhotos();
    await loadCustomExercises();
  } catch (err) {
    console.error('No se pudo inicializar la base de datos local', err);
  }

  switchTab('entrenar');
  enableSheetDragDismiss($('sheet-main-handle'), $('sheet-main'), closeMainSheet);

  // aviso si el usuario cierra la pestaña con un entreno activo sin guardar
  window.addEventListener('beforeunload', (e) => {
    if (activeWorkout && activeWorkout.exercises.some(ex => ex.sets.some(s => s.done))) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

initApp();
