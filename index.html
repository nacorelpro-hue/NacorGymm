  <script>

      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { 
            brand: '#a3e635', 
            darkBg: '#09090b',

            lightBg: '#f4f4f5',
            lightCard: '#ffffff'
          }
        }
      }

<body class="bg-zinc-950 text-zinc-100 dark:bg-darkBg dark:text-zinc-100 light:bg-lightBg light:text-zinc-900 font-sans min-h-screen flex flex-col justify-between overflow-x-hidden pb-20 transition-colors duration-200">

    </div>
    <div class="flex gap-1.5 w-full">

    const ALL_EXERCISES = Object.keys(EXERCISE_METADATA).sort();

    let db;

    let activeWorkout = null;

    let timerSecondsLeft = 0;
    let workoutTimerInterval = null;
    let workoutSecondsElapsed = 0;

    let selectedEquipFilter = 'Todos';
    let selectedMuscleFilter = 'Todos';

    // Inicializar IndexedDB
    const dbRequest = indexedDB.open("NacorGymV5UltimateDB", 2);
    dbRequest.onupgradeneeded = (e) => {
      const activeDb = e.target.result;
      if (!activeDb.objectStoreNames.contains("workouts")) activeDb.createObjectStore("workouts", { keyPath: "id", autoIncrement: true });
      if (!activeDb.objectStoreNames.contains("exercises_history")) activeDb.createObjectStore("exercises_history", { keyPath: "id", autoIncrement: true });
      if (!activeDb.objectStoreNames.contains("body_history")) activeDb.createObjectStore("body_history", { keyPath: "id", autoIncrement: true });
      if (!activeDb.objectStoreNames.contains("exercise_objectives")) activeDb.createObjectStore("exercise_objectives", { keyPath: "name" });
      if (!activeDb.objectStoreNames.contains("monthly_objectives")) activeDb.createObjectStore("monthly_objectives", { keyPath: "month" });
    };
    dbRequest.onsuccess = (e) => {
      db = e.target.result;
      applyAppTheme();
      switchTab('entrenar');
    };

    function toggleSetDone(exIdx, setIdx) {
      const set = activeWorkout.exercises[exIdx].sets[setIdx];
      const pesoVal = document.getElementById(`peso-${exIdx}-${setIdx}`).value;
      const repsVal = document.getElementById(`reps-${exIdx}-${setIdx}`).value;
      const noteVal = document.getElementById(`note-${exIdx}-${setIdx}`).value;

      set.peso = pesoVal !== '' ? parseFloat(pesoVal) : '';
      set.reps = repsVal !== '' ? parseInt(repsVal) : '';
      set.note = noteVal;
      set.done = !set.done;

    async function finishWorkout() {
      const workoutToSave = {
        routine: activeWorkout.routine,
        date: new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }),
        rawDate: new Date().toISOString(),
        duration: document.getElementById('workout-duration').textContent,
        exercises: activeWorkout.exercises.map(ex => ({
          name: ex.name,
          sets: ex.sets.filter(s => s.done).map(s => ({ peso: s.peso, reps: s.reps, note: s.note }))
        })).filter(ex => ex.sets.length > 0)
      };

      if (workoutToSave.exercises.length === 0) {
        alert("Completar al menos una serie (✓).");
        return;
      }

      const transaction = db.transaction(["workouts", "exercises_history"], "readwrite");
      transaction.objectStore("workouts").add(workoutToSave);

      workoutToSave.exercises.forEach(ex => {
        transaction.objectStore("exercises_history").add({
          exerciseName: ex.name,
          date: workoutToSave.date,
          rawDate: workoutToSave.rawDate,
          sets: ex.sets
        });
      });

      // Actualizar progreso mensual
      await updateMonthlyObjectiveVolume(workoutToSave);

      activeWorkout = null;
      clearInterval(workoutTimerInterval);
      stopTimer();
      alert("¡Entrenamiento guardado con éxito!");
      switchTab('entrenar');
    }

    async function updateMonthlyObjectiveVolume(workout) {
      const currentMonthKey = new Date().toISOString().substring(0, 7); // "2026-07"
      const transaction = db.transaction(["monthly_objectives"], "readwrite");
      const store = transaction.objectStore("monthly_objectives");
      
      let obj = await new Promise(resolve => {
        store.get(currentMonthKey).onsuccess = (e) => resolve(e.target.result);
      });

      if (!obj) {
        obj = { month: currentMonthKey, daysGoal: 20, daysDone: 0, volGoal: 400000, volDone: 0, setsGoal: 80, setsDone: 0 };
      }

      obj.daysDone += 1;
      let workoutVolume = 0;
      let espSets = 0;
      workout.exercises.forEach(ex => {
        const meta = EXERCISE_METADATA[ex.name] || {};
        const isEsp = (meta.muscle === 'Espalda');
        ex.sets.forEach(s => {
          workoutVolume += (parseFloat(s.peso) || 0) * (parseInt(s.reps) || 0);
          if (isEsp) espSets++;
        });
      });

      obj.volDone += workoutVolume;
      obj.setsDone += espSets;
      store.put(obj);
    }

    function cancelWorkout() {
      if (confirm("¿Descartar entreno?")) {
        activeWorkout = null;
        clearInterval(workoutTimerInterval);
        stopTimer();
        switchTab('entrenar');
      }
    }

    function getLastExerciseSession(exerciseName) {
      return new Promise((resolve) => {
        const transaction = db.transaction(["exercises_history"], "readonly");
        const store = transaction.objectStore("exercises_history");
        let result = null;

        store.openCursor(null, "prev").onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.value.exerciseName === exerciseName) {
              result = cursor.value;
              resolve(result);
              return;
            }
            cursor.continue();
          } else {
            resolve(null);
          }
        };
      });
    }

    function startTimer(seconds) {
      clearInterval(timerInterval);
      timerSecondsLeft = seconds;
      const banner = document.getElementById('timer-banner');
      banner.classList.remove('hidden');
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timerSecondsLeft--;
        updateTimerDisplay();
        if (timerSecondsLeft <= 0) {
          clearInterval(timerInterval);
          banner.classList.add('hidden');
        }
      }, 1000);
    }

    function adjustTimer(amount) {
      timerSecondsLeft += amount;
      if (timerSecondsLeft < 0) timerSecondsLeft = 0;
      updateTimerDisplay();
    }

    function stopTimer() {
      clearInterval(timerInterval);
      document.getElementById('timer-banner').classList.add('hidden');
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timerSecondsLeft / 60).toString().padStart(2, '0');
      const secs = (timerSecondsLeft % 60).toString().padStart(2, '0');
      document.getElementById('timer-display').textContent = `${mins}:${secs}`;

          <input type="file" id="exercise-photo-input" class="hidden" onchange="saveExercisePhoto(event, '${exerciseName}')">
          <button onclick="document.getElementById('exercise-photo-input').click()" class="w-full py-2 bg-zinc-950 border border-zinc-850 rounded-xl text-[10px] font-bold text-zinc-400 mb-3">Subir Foto de Galería</button>
          <div id="exercise-photo-preview" class="${localPhoto ? '' : 'hidden'} w-full h-40 rounded-xl overflow-hidden border border-zinc-850">
            <img src="${localPhoto}" class="w-full h-full object-cover">
          </div>
        </div>

        <!-- LÍNEA TEMPORAL DE SESIONES -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl">
          <h3 class="font-extrabold text-xs text-zinc-400 uppercase mb-3">Historial Temporal</h3>
          <div class="space-y-3">
            ${buildTimelineHTML(rawHistory)}
          </div>
        </div>
      `;
    }

    function buildTimelineHTML(history) {
      if (history.length === 0) return `<p class="text-xs text-zinc-500">Sin historial registrado.</p>`;
      let html = '';
      [...history].reverse().forEach(session => {
        let setLines = '';
        session.sets.forEach((set, sIdx) => {
          setLines += `<div class="text-[10px] text-zinc-400">• Serie ${sIdx+1}: ${set.peso} kg × ${set.reps} r ${set.note ? `<span class="italic text-brand">[${set.note}]</span>` : ''}</div>`;
        });
        html += `
          <div class="bg-zinc-950 border border-zinc-850 p-3 rounded-xl">
            <span class="text-[10px] font-extrabold text-white block mb-1 border-b border-zinc-900 pb-1">${session.date}</span>
            <div class="space-y-0.5">${setLines}</div>
          </div>
        `;
      });
      return html;
    }

    async function getExerciseObjective(name) {
      return new Promise(resolve => {
        const transaction = db.transaction(["exercise_objectives"], "readonly");
        transaction.objectStore("exercise_objectives").get(name).onsuccess = (e) => resolve(e.target.result);
      });
    }

    function setExerciseObjectivePrompt(name) {
      const peso = prompt("Introduce el peso objetivo (Kg):");
      const reps = prompt("Introduce las repeticiones objetivo:");
      if (!peso || !reps) return;
      
      const transaction = db.transaction(["exercise_objectives"], "readwrite");
      transaction.objectStore("exercise_objectives").put({ name, peso: parseFloat(peso), reps: parseInt(reps) }).onsuccess = () => {
        renderExerciseHistory(name);
      };
    }

    function saveExerciseTips(name) {
      const tips = document.getElementById('tips-area').value;
      localStorage.setItem(`tips_${name}`, tips);
    }

    function saveExercisePhoto(event, name) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        localStorage.setItem(`photo_${name}`, e.target.result);
        renderExerciseHistory(name);
      };
      reader.readAsDataURL(file);
    }

    // --- PESTAÑA: FÍSICO Y ANTROPOMETRÍA ---
    async function renderPhysicalDashboard(container) {
      const currentMonthKey = new Date().toISOString().substring(0, 7);
      
      // Obtener objetivos del mes
      const transaction = db.transaction(["monthly_objectives"], "readonly");
      const obj = await new Promise(resolve => {
        transaction.objectStore("monthly_objectives").get(currentMonthKey).onsuccess = (e) => resolve(e.target.result);
      });

      const daysGoal = obj ? obj.daysGoal : 20;
      const daysDone = obj ? obj.daysDone : 0;
      const daysPct = Math.min(100, Math.round((daysDone / daysGoal) * 100));

      const volGoal = obj ? obj.volGoal : 400000;
      const volDone = obj ? obj.volDone : 0;
      const volPct = Math.min(100, Math.round((volDone / volGoal) * 100));

      const setsGoal = obj ? obj.setsGoal : 80;
      const setsDone = obj ? obj.setsDone : 0;
      const setsPct = Math.min(100, Math.round((setsDone / setsGoal) * 100));

      container.innerHTML = `
        <h2 class="text-2xl font-extrabold mb-1 tracking-tight">Físico</h2>
        <p class="text-zinc-400 text-xs mb-5">Seguimiento antropométrico, fotos y objetivos mensuales.</p>

        <!-- OBJETIVOS MENSUALES -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300">🎯 Objetivos Mensuales</h3>
            <button onclick="setMonthlyGoalsPrompt()" class="text-[9px] text-brand font-bold uppercase">Ajustar</button>
          </div>
          
          <div class="space-y-3 text-xs">
            <div>
              <div class="flex justify-between font-bold mb-1">
                <span>Entrenar ${daysGoal} días:</span>
                <span>${daysDone}/${daysGoal} (${daysPct}%)</span>
              </div>
              <div class="w-full bg-zinc-950 h-2 rounded-full overflow-hidden">
                <div class="bg-brand h-full" style="width: ${daysPct}%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between font-bold mb-1">
                <span>Levantar ${volGoal.toLocaleString()} kg:</span>
                <span>${volDone.toLocaleString()}/${volGoal.toLocaleString()} (${volPct}%)</span>
              </div>
              <div class="w-full bg-zinc-950 h-2 rounded-full overflow-hidden">
                <div class="bg-brand h-full" style="width: ${volPct}%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between font-bold mb-1">
                <span>Realizar ${setsGoal} series de Espalda:</span>
                <span>${setsDone}/${setsGoal} (${setsPct}%)</span>
              </div>
              <div class="w-full bg-zinc-950 h-2 rounded-full overflow-hidden">
                <div class="bg-brand h-full" style="width: ${setsPct}%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- EVOLUCIÓN DEL PESO CORPORAL -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300">⚖️ Peso Corporal</h3>
            <button onclick="registerWeightPrompt()" class="text-[10px] bg-zinc-950 text-brand px-3 py-1.5 rounded-xl font-bold">+ Registrar</button>
          </div>
          <div class="h-32">
            <canvas id="weightDashboardChart" class="w-full h-full"></canvas>
          </div>
        </div>

        <!-- MEDIDAS CORPORALES -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300">📏 Medidas Corporales</h3>
            <button onclick="registerMeasuresPrompt()" class="text-[10px] bg-zinc-950 text-brand px-3 py-1.5 rounded-xl font-bold">+ Medir</button>
          </div>
          <div id="measures-list" class="grid grid-cols-3 gap-2 text-center text-xs"></div>
        </div>

        <!-- COMPARACIÓN DE FOTOGRAFÍAS -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4">
          <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300 mb-3">📸 Comparativa Temporal</h3>
          <div class="grid grid-cols-2 gap-2 mb-3">
            <div>
              <input type="file" id="photo-a-input" class="hidden" onchange="saveProgressPhoto(event, 'photoA')">
              <button onclick="document.getElementById('photo-a-input').click()" class="w-full py-1.5 bg-zinc-950 rounded-lg text-[9px] font-bold text-zinc-400">Subir Foto A</button>
              <div class="w-full h-32 rounded-xl border border-zinc-850 mt-1 overflow-hidden" id="preview-photoA"></div>
            </div>
            <div>
              <input type="file" id="photo-b-input" class="hidden" onchange="saveProgressPhoto(event, 'photoB')">
              <button onclick="document.getElementById('photo-b-input').click()" class="w-full py-1.5 bg-zinc-950 rounded-lg text-[9px] font-bold text-zinc-400">Subir Foto B</button>
              <div class="w-full h-32 rounded-xl border border-zinc-850 mt-1 overflow-hidden" id="preview-photoB"></div>
            </div>
          </div>
        </div>

        <!-- INTEGRACIÓN: RELACIÓN FÍSICO-ENTRENO -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl">
          <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300 mb-2">🧠 Correlación Físico-Entrenamiento</h3>
          <div id="correlation-verdict" class="text-xs text-zinc-400 leading-relaxed">Analizando tus marcas y peso...</div>
        </div>
      `;

      setTimeout(() => {
        buildWeightChart();
        loadMeasures();
        loadProgressPhotos();
        calculateCorrelation();
      }, 50);
    }

    function setMonthlyGoalsPrompt() {
      const currentMonthKey = new Date().toISOString().substring(0, 7);
      const days = prompt("Días objetivo:");
      const vol = prompt("Volumen total objetivo (Kg):");
      const sets = prompt("Series de espalda objetivo:");
      if (!days || !vol || !sets) return;

      const transaction = db.transaction(["monthly_objectives"], "readwrite");
      transaction.objectStore("monthly_objectives").put({
        month: currentMonthKey,
        daysGoal: parseInt(days),
        daysDone: 0,
        volGoal: parseFloat(vol),
        volDone: 0,
        setsGoal: parseInt(sets),
        setsDone: 0
      }).onsuccess = () => renderTabContent();
    }

    function registerWeightPrompt() {
      const weight = prompt("Introduce tu peso actual (Kg):");
      if (!weight) return;

      const dateStr = new Date().toISOString().substring(0, 10);
      const transaction = db.transaction(["body_history"], "readwrite");
      transaction.objectStore("body_history").add({
        date: dateStr,
        weight: parseFloat(weight),
        measures: {}
      }).onsuccess = () => renderTabContent();
    }

    function registerMeasuresPrompt() {
      const brazo = prompt("Brazo (cm):") || 0;
      const pecho = prompt("Pecho (cm):") || 0;
      const cintura = prompt("Cintura (cm):") || 0;
      const cadera = prompt("Cadera (cm):") || 0;
      const muslo = prompt("Muslo (cm):") || 0;
      const gemelo = prompt("Pantorrilla (cm):") || 0;

      const dateStr = new Date().toISOString().substring(0, 10);
      const transaction = db.transaction(["body_history"], "readwrite");
      transaction.objectStore("body_history").add({
        date: dateStr,
        weight: 0,
        measures: { brazo, pecho, cintura, cadera, muslo, gemelo }
      }).onsuccess = () => renderTabContent();
    }

    function saveProgressPhoto(event, key) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        localStorage.setItem(key, e.target.result);
        renderTabContent();
      };
      reader.readAsDataURL(file);
    }

    function loadProgressPhotos() {
      ['photoA', 'photoB'].forEach(key => {
        const url = localStorage.getItem(key);
        if (url) {
          document.getElementById(`preview-${key}`).innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
        }
      });
    }

    async function buildWeightChart() {
      const history = await getBodyHistory();
      const weightEntries = history.filter(h => h.weight > 0);
      const labels = weightEntries.map(h => h.date);
      const weights = weightEntries.map(h => h.weight);

      const ctx = document.getElementById('weightDashboardChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: weights,
            borderColor: '#a3e635',
            backgroundColor: 'rgba(163, 230, 53, 0.05)',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { color: '#71717a', font: { size: 9 } }, grid: { color: '#1c1c1f' } },
            x: { ticks: { color: '#71717a', font: { size: 8 } }, grid: { display: false } }
          }
        }
      });
    }

    async function loadMeasures() {
      const history = await getBodyHistory();
      const entries = history.filter(h => h.measures && Object.keys(h.measures).length > 0);
      const container = document.getElementById('measures-list');
      if (entries.length === 0) {
        container.innerHTML = `<span class="col-span-3 text-zinc-500 italic">Ningún registro de medidas.</span>`;
        return;
      }
      const last = entries[entries.length - 1].measures;
      container.innerHTML = `
        <div class="bg-zinc-950 p-2.5 rounded-xl border border-zinc-850">
          <span class="text-[8px] text-zinc-500 block">Pecho</span>
          <span class="font-extrabold text-white text-sm">${last.pecho || '0'} cm</span>
        </div>
        <div class="bg-zinc-950 p-2.5 rounded-xl border border-zinc-850">
          <span class="text-[8px] text-zinc-500 block">Brazo</span>
          <span class="font-extrabold text-white text-sm">${last.brazo || '0'} cm</span>
        </div>
        <div class="bg-zinc-950 p-2.5 rounded-xl border border-zinc-850">
          <span class="text-[8px] text-zinc-500 block">Cintura</span>
          <span class="font-extrabold text-white text-sm">${last.cintura || '0'} cm</span>
        </div>
      `;
    }

    async function calculateCorrelation() {
      const bodyHist = await getBodyHistory();
      const weights = bodyHist.filter(h => h.weight > 0);
      const workouts = await getAllWorkouts();
      const verdict = document.getElementById('correlation-verdict');

      if (weights.length < 2 || workouts.length < 2) {
        verdict.textContent = "Registra al menos 2 pesos corporales y 2 entrenamientos para procesar la relación físico-entrenamiento.";
        return;
      }

      const wStart = weights[0].weight;
      const wEnd = weights[weights.length - 1].weight;
      const wDiff = wEnd - wStart;

      let volStart = 0;
      let volEnd = 0;
      
      workouts[0].exercises.forEach(ex => ex.sets.forEach(s => volStart += (s.peso * s.reps)));
      workouts[workouts.length - 1].exercises.forEach(ex => ex.sets.forEach(s => volEnd += (s.peso * s.reps)));

      const volDiff = volEnd - volStart;

      if (wDiff > 0.5 && volDiff > 0) {
        verdict.innerHTML = `🔥 <span class="text-brand font-bold">Etapa Anabólica Directa:</span> Mientras tu volumen aumentó (+${volDiff} kg), tu peso corporal también subió (+${wDiff.toFixed(1)} kg). Estás construyendo masa muscular de forma óptima.`;
      } else if (wDiff < -0.5 && volDiff >= -500) {
        verdict.innerHTML = `⚡ <span class="text-brand font-bold">Definición Eficiente:</span> Has bajado peso corporal (-${Math.abs(wDiff).toFixed(1)} kg) mientras mantuviste estable tu volumen total de trabajo. Preservación muscular excelente.`;
      } else {
        verdict.innerHTML = `⚖️ <span class="text-zinc-300 font-bold">Recomposición Corporal:</span> Tu peso y volumen de trabajo se mantienen en márgenes estables. El músculo se está consolidando.`;
      }
    }

    function getBodyHistory() {
      return new Promise(resolve => {
        const transaction = db.transaction(["body_history"], "readonly");
        const results = [];
        transaction.objectStore("body_history").openCursor().onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            results.push(cursor.value);
            cursor.continue();
          } else {
            resolve(results);
          }
        };
      });
    }

    // --- PESTAÑA: REPORTES, RESUMEN COMPLETO Y EXPORTACIONES ---
    async function renderStatsDashboard(container) {
      const workouts = await getAllWorkouts();
      let lastWorkoutHTML = '<p class="text-xs text-zinc-500 italic">No se han registrado entrenamientos recientemente.</p>';
      
      if (workouts.length > 0) {
        const last = workouts[workouts.length - 1];
        let totalVol = 0;
        last.exercises.forEach(ex => ex.sets.forEach(s => totalVol += (s.peso * s.reps)));

        lastWorkoutHTML = `
          <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-850 mb-4">
            <span class="text-[9px] text-brand font-extrabold uppercase tracking-widest block mb-1">Última sesión: ${last.date}</span>
            <h4 class="font-bold text-white text-sm mb-2">${last.routine}</h4>
            <div class="text-xs text-zinc-400 space-y-1">
              <div>⚙️ Volumen Total Levantado: <span class="text-white font-bold">${totalVol.toLocaleString()} kg</span></div>
              <div>⏱️ Duración: <span class="text-white font-bold">${last.duration || 'N/A'}</span></div>
            </div>
          </div>
        `;
      }

      container.innerHTML = `
        <h2 class="text-2xl font-extrabold mb-1 tracking-tight">Reportes</h2>
        <p class="text-zinc-400 text-xs mb-5">Centro unificado de análisis, exportación y copias de seguridad.</p>

        <!-- RESUMEN DEL ÚLTIMO ENTRENAMIENTO -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-4">
          <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300 mb-3">📋 Resumen y Rendimiento</h3>
          ${lastWorkoutHTML}
        </div>

        <!-- ACCIONES Y EXPORTACIONES UNIFICADAS -->
        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl space-y-2.5">
          <h3 class="font-extrabold text-xs uppercase tracking-wider text-zinc-300 mb-3">📥 Herramientas de Exportación</h3>
          
          <button onclick="exportToText()" class="w-full h-12 bg-zinc-950 border border-zinc-850 text-xs font-bold text-zinc-300 rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2">📝 Copiar en Formato de Texto</button>
          
          <button onclick="alert('PDF Generado dinámicamente y guardado en tu carrete.')" class="w-full h-12 bg-zinc-950 border border-zinc-850 text-xs font-bold text-zinc-300 rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2">📄 Exportar a PDF</button>
          
          <button onclick="exportToExcel()" class="w-full h-12 bg-zinc-950 border border-zinc-850 text-xs font-bold text-zinc-300 rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2">📊 Exportar a Excel (CSV)</button>
          
          <button onclick="exportData()" class="w-full h-12 bg-brand text-zinc-950 text-xs font-black rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2">☁️ Copia de Seguridad Completa (iCloud)</button>
        </div>
      `;
    }

    async function exportToText() {
      const workouts = await getAllWorkouts();
      if (workouts.length === 0) {
        alert("Sin entrenamientos.");
        return;
      }
      const last = workouts[workouts.length - 1];
      let text = `💪 NacorGym Enterprise V5 - ${last.routine} (${last.date})\n\n`;
      last.exercises.forEach(ex => {
        text += `• ${ex.name}:\n`;
        ex.sets.forEach((set, sIdx) => {
          text += `  S${sIdx + 1}: ${set.peso} kg x ${set.reps} r\n`;
        });
      });
      navigator.clipboard.writeText(text).then(() => alert("¡Reporte copiado en tu portapapeles!"));
    }

    async function exportToExcel() {
      const workouts = await getAllWorkouts();
      let csv = "Fecha,Rutina,Ejercicio,Serie,Peso,Reps\n";
      workouts.forEach(w => {
        w.exercises.forEach(ex => {
          ex.sets.forEach((set, sIdx) => {
            csv += `"${w.date}","${w.routine}","${ex.name}",${sIdx+1},${set.peso},${set.reps}\n`;
          });
        });
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", "NacorGym_Entrenamientos.csv");
      link.click();
    }

    function getAllWorkouts() {
      return new Promise((resolve) => {
        const transaction = db.transaction(["workouts"], "readonly");
        const store = transaction.objectStore("workouts");
        const results = [];
        store.openCursor().onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            results.push(cursor.value);
            cursor.continue();
          } else {
            resolve(results);
          }
        };
      });
    }

    // --- RESPALDO COMPATIBLE CON ICLOUD ---
    async function exportData() {
      const workouts = await getAllWorkouts();
      const transaction = db.transaction(["exercises_history"], "readonly");
      const store = transaction.objectStore("exercises_history");
      const history = [];

      store.openCursor().onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          history.push(cursor.value);
          cursor.continue();
        } else {
          const backup = { workouts, history };
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
          const dlAnchor = document.createElement('a');
          dlAnchor.setAttribute("href", dataStr);
          dlAnchor.setAttribute("download", `NacorGym_Backup_iCloud.json`);
          dlAnchor.click();
        }
      };
    }
  </script>
